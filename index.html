async function getOrCreateGist() {
  if (GIST_ID) return GIST_ID;
  const list = await fetch("https://api.github.com/gists", {
    headers: { Authorization: "token " + GH_TOKEN }
  }).then(r => r.json());
  const found = Array.isArray(list) && list.find(g => g.files && g.files[GIST_FILE]);
  if (found) { GIST_ID = found.id; localStorage.setItem("lextrace_gist_id", GIST_ID); return GIST_ID; }
  const created = await fetch("https://api.github.com/gists", {
    method: "POST",
    headers: { Authorization: "token " + GH_TOKEN, "Content-Type": "application/json" },
    body: JSON.stringify({ description: "LexTrace Reports", public: false, files: { [GIST_FILE]: { content: JSON.stringify({ reports: [] }) } } })
  }).then(r => r.json());
  GIST_ID = created.id;
  localStorage.setItem("lextrace_gist_id", GIST_ID);
  return GIST_ID;
}

async function loadReports() {
  try {
    const id = await getOrCreateGist();
    const g  = await fetch("https://api.github.com/gists/" + id, { headers: { Authorization: "token " + GH_TOKEN } }).then(r => r.json());
    return JSON.parse(g.files?.[GIST_FILE]?.content || '{"reports":[]}').reports || [];
  } catch { return []; }
}

async function saveReports(reports) {
  try {
    const id = await getOrCreateGist();
    await fetch("https://api.github.com/gists/" + id, {
      method: "PATCH",
      headers: { Authorization: "token " + GH_TOKEN, "Content-Type": "application/json" },
      body: JSON.stringify({ files: { [GIST_FILE]: { content: JSON.stringify({ reports }) } } })
    });
    return true;
  } catch { return false; }
}

function exportPDF(report) {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit: "mm", format: "a4" });
  const pageW = doc.internal.pageSize.getWidth();
  const margin = 15, maxW = pageW - margin * 2;
  let y = 20;
  const addText = (text, size, bold, color) => {
    doc.setFontSize(size); doc.setFont("helvetica", bold ? "bold" : "normal");
    doc.setTextColor(...(color || [30,30,30]));
    doc.splitTextToSize(text, maxW).forEach(line => {
      if (y > 270) { doc.addPage(); y = 20; }
      doc.text(line, margin, y); y += size * 0.45;
    }); y += 2;
  };
  doc.setFillColor(184,48,42); doc.rect(0,0,pageW,14,"F");
  doc.setFontSize(14); doc.setFont("helvetica","bold"); doc.setTextColor(255,255,255);
  doc.text("LexTrace — Dossier Investigativo", margin, 10); y = 24;
  report.sections.forEach((s, i) => {
    doc.setFillColor(i===0?26:46,26,26); doc.rect(margin-2,y-5,maxW+4,8,"F");
    doc.setFontSize(8); doc.setFont("helvetica","bold"); doc.setTextColor(245,242,235);
    doc.text(s.title, margin, y); y += 6;
    addText(s.content, 9, false, [40,40,40]); y += 3;
  });
  // Checklist nel PDF
  if (report.checklist && report.checklist.length > 0) {
    doc.setFillColor(46,46,46); doc.rect(margin-2,y-5,maxW+4,8,"F");
    doc.setFontSize(8); doc.setFont("helvetica","bold"); doc.setTextColor(245,242,235);
    doc.text("CHECKLIST VERIFICHE", margin, y); y += 8;
    report.checklist.forEach(item => {
      if (y > 270) { doc.addPage(); y = 20; }
      const stato = item.stato === "completato" ? "✓" : item.stato === "in_corso" ? "◎" : "○";
      doc.setFontSize(9); doc.setFont("helvetica","normal"); doc.setTextColor(40,40,40);
      doc.text(stato + " " + item.label + (item.note ? " — " + item.note : ""), margin, y);
      y += 6;
    });
    y += 4;
  }
  if (report.note) { addText("NOTE PERSONALI", 10, true, [184,48,42]); addText(report.note, 9, false); }
  const pages = doc.internal.getNumberOfPages();
  for (let i = 1; i <= pages; i++) {
    doc.setPage(i); doc.setFontSize(7); doc.setTextColor(150);
    doc.text("LexTrace · Uso professionale · GDPR Art. 6 · " + i + "/" + pages, margin, 290);
  }
  doc.save("LexTrace_" + (report.soggetto||"report").replace(/\s+/g,"_") + "_" + new Date().toISOString().slice(0,10) + ".pdf");
}

// ─── CHECKLIST COMPONENT ──────────────────────────────────────────────────────
function Checklist({ checklist, onChange }) {
  const STATI = ["non_verificato", "in_corso", "completato", "non_trovato"];
  const STATI_LABEL = { non_verificato: "○ Da verificare", in_corso: "◎ In corso", completato: "✓ Completato", non_trovato: "✗ Non trovato" };
  const STATI_COLOR = { non_verificato: "#aaa", in_corso: "#e67e00", completato: "#2e7d32", non_trovato: "#b8302a" };

  const updateItem = (id, field, val) => {
    onChange(checklist.map(item => item.id === id ? { ...item, [field]: val } : item));
  };

  return (
    <div>
      {checklist.map(item => (
        <div key={item.id} style={{ background:"#fff", border:"1px solid #e0dcd4", borderRadius:4, padding:"12px 16px", marginBottom:8 }}>
          <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", flexWrap:"wrap", gap:8 }}>
            <div style={{ flex:1 }}>
              <div style={{ fontSize:"0.78rem", color:"#1a1a1a", fontWeight:"bold" }}>{item.label}</div>
              <div style={{ fontSize:"0.62rem", color:"#aaa", marginTop:2 }}>Fonte: {item.fonte}</div>
            </div>
            <div style={{ display:"flex", alignItems:"center", gap:8 }}>
              <a href={item.link} target="_blank" rel="noopener noreferrer" style={{ fontSize:"0.62rem", color:"#b8302a", textTransform:"uppercase", letterSpacing:"0.04em" }}>Apri →</a>
              <select
                value={item.stato}
                onChange={e=>updateItem(item.id, "stato", e.target.value)}
                style={{ border:"1px solid #ccc", borderRadius:3, padding:"4px 8px", fontFamily:"monospace", fontSize:"0.68rem", color: STATI_COLOR[item.stato], background:"#fafaf8", outline:"none" }}
              >
                {STATI.map(s => <option key={s} value={s}>{STATI_LABEL[s]}</option>)}
              </select>
            </div>
          </div>
          {/* Campo note per ogni voce */}
          <input
            placeholder="Note (es. 2 auto intestate, nessun immobile trovato...)"
            value={item.note || ""}
            onChange={e=>updateItem(item.id, "note", e.target.value)}
            style={{ width:"100%", marginTop:8, padding:"6px 10px", border:"1px solid #e0dcd4", borderRadius:3, fontFamily:"monospace", fontSize:"0.72rem", background:"#fafaf8", outline:"none" }}
          />
        </div>
      ))}
    </div>
  );
}

  const [search,    setSearch]    = useState("");
  const [editRep,   setEditRep]   = useState(null);
  const [delConf,   setDelConf]   = useState(null);
  const [checklist, setChecklist] = useState(CHECKLIST_ITEMS.map(i => ({ ...i, stato: "non_verificato", note: "" })));

  useEffect(() => {
    if (view === "archivio") { setLoading(true); loadReports().then(r => { setReports(r); setLoading(false); }); }
  }, [view]);

  const toggleSrc = id => setSources(s => s.includes(id) ? s.filter(x => x !== id) : [...s, id]);
  const data      = { tab, nome, cognome, cf, citta, ragione, piva, sede, contesto, note, sources };
  const soggetto  = tab === "persona" ? (nome + " " + cognome).trim() : ragione;
  const canSearch = tab === "persona" ? nome.trim().length > 0 : ragione.trim().length > 0;
  const links     = buildLinks(data);
  const sections  = generateSections(data);

  const filteredReports = reports.filter(r => {
    if (!search.trim()) return true;
    const q = search.toLowerCase().trim();
    return (r.soggetto||"").toLowerCase().includes(q) || (r.cf||"").toLowerCase().includes(q) || (r.piva||"").toLowerCase().includes(q) || (r.contesto||"").toLowerCase().includes(q);
  });

  const showMsg = m => { setMsg(m); setTimeout(() => setMsg(""), 3000); };

  const handleSave = async () => {
    setSaving(true);
    const report = {
      id: Date.now(), data: new Date().toLocaleString("it-IT"),
      soggetto, tab, contesto: contesto || "Recupero crediti",
      note, cf, piva, sections, links, checklist,
    };
    const existing = await loadReports();
    const ok = await saveReports([report, ...existing]);
    ok ? showMsg("✅ Salvato in archivio!") : showMsg("❌ Errore salvataggio");
    setSaving(false);
  };

  const handleDelete = async id => {
    const updated = reports.filter(r => r.id !== id);
    const ok = await saveReports(updated);
    if (ok) { setReports(updated); showMsg("🗑 Report eliminato"); }
    else showMsg("❌ Errore eliminazione");
    setDelConf(null);
  };

  const handleEdit = async updated => {
    const newList = reports.map(r => r.id === updated.id ? { ...updated, modificato: new Date().toLocaleString("it-IT") } : r);
    const ok = await saveReports(newList);
    if (ok) { setReports(newList); showMsg("✅ Modifiche salvate"); }
    else showMsg("❌ Errore salvataggio");
    setEditRep(null);
  };

  const inp = { width:"100%", padding:"9px 12px", border:"1px solid #ccc", borderRadius:3, fontFamily:"monospace", fontSize:"0.82rem", background:"#fafaf8", outline:"none" };
  const lbl = { display:"block", fontSize:"0.6rem", textTransform:"uppercase", letterSpacing:"0.08em", color:"#888", marginBottom:5 };
  const btn = (bg, disabled) => ({ padding:"12px 0", background:disabled?"#ccc":bg, color:"#fff", border:"none", borderRadius:3, cursor:disabled?"not-allowed":"pointer", fontFamily:"monospace", fontSize:"0.75rem", textTransform:"uppercase", letterSpacing:"0.05em", width:"100%" });

  return (
    <div style={{ background:"#f5f2eb", minHeight:"100vh", padding:"28px 20px" }}>
      <div style={{ maxWidth:820, margin:"0 auto" }}>

        {/* Header */}
        <div style={{ borderBottom:"2px solid #1a1a1a", paddingBottom:16, marginBottom:24 }}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", flexWrap:"wrap", gap:8 }}>
            <div>
              <h1 style={{ fontFamily:"Georgia,serif", fontSize:"2.2rem", lineHeight:1 }}>Lex<span style={{ color:"#b8302a" }}>Trace</span></h1>
              <p style={{ fontSize:"0.65rem", color:"#888", marginTop:5, textTransform:"uppercase", letterSpacing:"0.06em" }}>Ricerca investigativa · Fonti pubbliche italiane</p>
            </div>
            <div style={{ display:"flex", gap:8 }}>
              <button onClick={()=>setView("form")} style={{ background:view==="form"?"#1a1a1a":"#e8e4dc", color:view==="form"?"#fff":"#555", border:"none", borderRadius:3, padding:"7px 16px", cursor:"pointer", fontFamily:"monospace", fontSize:"0.7rem", textTransform:"uppercase" }}>🔍 Ricerca</button>
              <button onClick={()=>setView("archivio")} style={{ background:view==="archivio"?"#1a1a1a":"#e8e4dc", color:view==="archivio"?"#fff":"#555", border:"none", borderRadius:3, padding:"7px 16px", cursor:"pointer", fontFamily:"monospace", fontSize:"0.7rem", textTransform:"uppercase" }}>📁 Archivio {reports.length > 0 && `(${reports.length})`}</button>
            </div>
          </div>
        </div>

        {/* FORM */}
        {view === "form" && (
          <>
            <div style={{ display:"flex", borderBottom:"1px solid #ccc", marginBottom:20 }}>
              {[["persona","👤 Persona fisica"],["azienda","🏢 Azienda"]].map(([t,l]) => (
                <button key={t} onClick={()=>setTab(t)} style={{ background:"none", border:"none", marginBottom:-1, cursor:"pointer", fontFamily:"monospace", borderBottom:tab===t?"2px solid #b8302a":"2px solid transparent", padding:"9px 20px", fontSize:"0.72rem", textTransform:"uppercase", color:tab===t?"#1a1a1a":"#888" }}>{l}</button>
              ))}
            </div>

            <div style={{ background:"#fff", border:"1px solid #d8d4cc", borderRadius:4, padding:22, marginBottom:16 }}>
              <div style={{ fontSize:"0.6rem", textTransform:"uppercase", color:"#aaa", letterSpacing:"0.1em", marginBottom:16, paddingBottom:8, borderBottom:"1px solid #eee" }}>Dati soggetto</div>
              {tab === "persona" ? (
                <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12 }}>
                  <div><label style={lbl}>Nome *</label><input style={inp} value={nome} onChange={e=>setNome(e.target.value)} placeholder="Mario" /></div>
                  <div><label style={lbl}>Cognome</label><input style={inp} value={cognome} onChange={e=>setCognome(e.target.value)} placeholder="Rossi" /></div>
                  <div><label style={lbl}>Codice Fiscale</label><input style={inp} value={cf} onChange={e=>setCf(e.target.value)} placeholder="RSSMRA80A01H501U" /></div>
                  <div><label style={lbl}>Città</label><input style={inp} value={citta} onChange={e=>setCitta(e.target.value)} placeholder="Milano" /></div>
                  <div style={{ gridColumn:"1/-1" }}><label style={lbl}>Contesto</label><input style={inp} value={contesto} onChange={e=>setContesto(e.target.value)} placeholder="es. recupero credito €15.000" /></div>
                </div>
              ) : (
                <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12 }}>
                  <div><label style={lbl}>Ragione Sociale *</label><input style={inp} value={ragione} onChange={e=>setRagione(e.target.value)} placeholder="Rossi Srl" /></div>
                  <div><label style={lbl}>Partita IVA</label><input style={inp} value={piva} onChange={e=>setPiva(e.target.value)} placeholder="01234567890" /></div>
                  <div><label style={lbl}>Sede</label><input style={inp} value={sede} onChange={e=>setSede(e.target.value)} placeholder="Via Roma 1, Milano" /></div>
                  <div><label style={lbl}>Contesto</label><input style={inp} value={contesto} onChange={e=>setContesto(e.target.value)} placeholder="es. recupero credito €50.000" /></div>
                </div>
              )}
              <div style={{ marginTop:12 }}>
                <label style={lbl}>Note personali</label>
                <textarea style={{ ...inp, resize:"vertical" }} rows={2} value={note} onChange={e=>setNote(e.target.value)} placeholder="Informazioni aggiuntive, comportamenti noti, precedenti..." />
              </div>
            </div>

            {/* Fonti */}
            <div style={{ background:"#fff", border:"1px solid #d8d4cc", borderRadius:4, padding:22, marginBottom:16 }}>
              <div style={{ fontSize:"0.6rem", textTransform:"uppercase", color:"#aaa", letterSpacing:"0.1em", marginBottom:14, paddingBottom:8, borderBottom:"1px solid #eee" }}>Fonti</div>
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8 }}>
                {SOURCES.map(s => (
                  <div key={s.id} onClick={()=>toggleSrc(s.id)} style={{ display:"flex", alignItems:"center", gap:10, padding:"9px 14px", border:"1px solid", borderRadius:3, cursor:"pointer", borderColor:sources.includes(s.id)?"#b8302a":"#ddd", background:sources.includes(s.id)?"#fff5f5":"#fafaf8" }}>
                    <div style={{ width:9, height:9, borderRadius:2, flexShrink:0, border:"1.5px solid", borderColor:sources.includes(s.id)?"#b8302a":"#ccc", background:sources.includes(s.id)?"#b8302a":"transparent" }} />
                    <div>
                      <div style={{ fontSize:"0.75rem", color:"#1a1a1a" }}>{s.name}</div>
                      <div style={{ fontSize:"0.6rem", color:"#aaa" }}>{s.cost}</div>
                    </div>
                  </div>
                ))}
              </div>
            </div>

            {/* Sub-tabs risultati */}
            {canSearch && (
              <>
                <div style={{ display:"flex", borderBottom:"1px solid #ccc", marginBottom:16, gap:0 }}>
                  {[["dossier","📄 Dossier"],["links","🔗 Link ricerca"],["checklist","✅ Checklist verifiche"]].map(([v,l]) => (
                    <button key={v} onClick={()=>setSubview(v)} style={{ background:"none", border:"none", marginBottom:-1, cursor:"pointer", fontFamily:"monospace", borderBottom:subview===v?"2px solid #b8302a":"2px solid transparent", padding:"8px 16px", fontSize:"0.68rem", textTransform:"uppercase", color:subview===v?"#1a1a1a":"#888" }}>{l}</button>
                  ))}
                </div>

                {/* DOSSIER */}
                {subview === "dossier" && (
                  <div>
                    {sections.map((s, i) => (
                      <div key={i} style={{ background:"#fff", border:"1px solid #d8d4cc", borderRadius:4, marginBottom:10, overflow:"hidden" }}>
                        <div style={{ background:i===0?"#1a1a1a":"#2e2e2e", color:"#f5f2eb", padding:"10px 18px", fontSize:i===0?"0.75rem":"0.65rem", letterSpacing:"0.1em", textTransform:"uppercase" }}>{s.title}</div>
                        <pre style={{ padding:"16px 18px", margin:0, whiteSpace:"pre-wrap", fontSize:"0.78rem", lineHeight:1.9, color:"#2a2a2a", fontFamily:"monospace" }}>{s.content}</pre>
                      </div>
                    ))}
                    <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12, marginTop:4 }}>
                      <button onClick={handleSave} disabled={saving} style={btn("#2e7d32", saving)}>{saving?"Salvataggio...":"💾 Salva in archivio"}</button>
                      <button onClick={()=>exportPDF({ soggetto, sections, checklist, note })} style={btn("#b8302a", false)}>📥 Scarica PDF</button>
                    </div>
                    {msg && <div style={{ marginTop:8, fontSize:"0.78rem", color:msg.includes("✅")?"#2e7d32":"#b8302a" }}>{msg}</div>}
                  </div>
                )}

                {/* LINKS */}
                {subview === "links" && (
                  <div>
                    <div style={{ fontSize:"0.65rem", color:"#888", marginBottom:14, textTransform:"uppercase" }}>Link per: <strong style={{ color:"#1a1a1a" }}>{soggetto}</strong></div>
                    {links.map((group, gi) => (
                      <div key={gi} style={{ background:"#fff", border:"1px solid #d8d4cc", borderRadius:4, marginBottom:10, overflow:"hidden" }}>
                        <div style={{ background:"#2e2e2e", color:"#f5f2eb", padding:"9px 16px", fontSize:"0.65rem", textTransform:"uppercase", letterSpacing:"0.1em" }}>{group.label}</div>
                        {group.links.map((link, li) => (
                          <a key={li} href={link.url} target="_blank" rel="noopener noreferrer"
                            style={{ display:"flex", justifyContent:"space-between", padding:"10px 16px", background:"#fff", color:"inherit", borderBottom:li<group.links.length-1?"1px solid #f0ede6":"none" }}
                            onMouseEnter={e=>e.currentTarget.style.background="#fff8f8"}
                            onMouseLeave={e=>e.currentTarget.style.background="#fff"}
                          >
                            <span style={{ fontSize:"0.78rem", color:"#1a1a1a" }}>{link.name}</span>
                            <span style={{ fontSize:"0.65rem", color:"#b8302a" }}>APRI →</span>
                          </a>
                        ))}
                      </div>
                    ))}
                    <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12, marginTop:8 }}>
                      <button onClick={handleSave} disabled={saving} style={btn("#2e7d32", saving)}>{saving?"Salvataggio...":"💾 Salva in archivio"}</button>
                      <button onClick={()=>exportPDF({ soggetto, sections, checklist, note })} style={btn("#b8302a", false)}>📥 Scarica PDF</button>
                    </div>
                    {msg && <div style={{ marginTop:8, fontSize:"0.78rem", color:msg.includes("✅")?"#2e7d32":"#b8302a" }}>{msg}</div>}
                  </div>
                )}

                {/* CHECKLIST */}
                {subview === "checklist" && (
                  <div>
                    <div style={{ fontSize:"0.65rem", color:"#888", marginBottom:14, textTransform:"uppercase" }}>
                      Checklist verifiche per: <strong style={{ color:"#1a1a1a" }}>{soggetto}</strong>
                    </div>
                    <Checklist checklist={checklist} onChange={setChecklist} />
                    <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12, marginTop:12 }}>
                      <button onClick={handleSave} disabled={saving} style={btn("#2e7d32", saving)}>{saving?"Salvataggio...":"💾 Salva in archivio"}</button>
                      <button onClick={()=>exportPDF({ soggetto, sections, checklist, note })} style={btn("#b8302a", false)}>📥 Scarica PDF</button>
                    </div>
                    {msg && <div style={{ marginTop:8, fontSize:"0.78rem", color:msg.includes("✅")?"#2e7d32":"#b8302a" }}>{msg}</div>}
                  </div>
                )}
              </>
            )}
          </>
        )}

        {/* ARCHIVIO */}
        {view === "archivio" && (
          <div>
            <div style={{ position:"relative", marginBottom:20 }}>
              <input style={{ ...inp, paddingLeft:36, fontSize:"0.85rem" }} value={search} onChange={e=>setSearch(e.target.value)} placeholder="Cerca per nome, CF, P.IVA, contesto..." />
              <span style={{ position:"absolute", left:12, top:"50%", transform:"translateY(-50%)", color:"#aaa" }}>🔍</span>
              {search && <span onClick={()=>setSearch("")} style={{ position:"absolute", right:12, top:"50%", transform:"translateY(-50%)", cursor:"pointer", color:"#aaa" }}>✕</span>}
            </div>
            {msg && <div style={{ marginBottom:12, fontSize:"0.78rem", color:msg.includes("✅")||msg.includes("🗑")?"#2e7d32":"#b8302a", padding:"8px 12px", background:"#f0fff0", borderRadius:3 }}>{msg}</div>}
            {loading && <div style={{ color:"#888", fontSize:"0.8rem", padding:20 }}>Caricamento...</div>}
            {!loading && filteredReports.length === 0 && (
              <div style={{ background:"#fff", border:"1px solid #d8d4cc", borderRadius:4, padding:48, textAlign:"center", color:"#bbb", fontSize:"0.75rem", textTransform:"uppercase" }}>
                {search ? `Nessun risultato per "${search}"` : "Nessun report salvato"}
              </div>
            )}
            {!loading && filteredReports.map(r => (
              <div key={r.id} style={{ background:"#fff", border:"1px solid #d8d4cc", borderRadius:4, marginBottom:12, overflow:"hidden" }}>
                <div style={{ background:"#1a1a1a", color:"#f5f2eb", padding:"12px 18px" }}>
                  <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", flexWrap:"wrap", gap:8 }}>
                    <div>
                      <div style={{ fontSize:"0.88rem", fontWeight:"bold" }}>{r.soggetto}</div>
                      <div style={{ fontSize:"0.62rem", color:"#aaa", marginTop:3 }}>
                        {r.tab==="persona"?"👤 Persona":"🏢 Azienda"} · {r.contesto}
                        {r.cf   && <span style={{ marginLeft:10 }}>CF: {r.cf}</span>}
                        {r.piva && <span style={{ marginLeft:10 }}>P.IVA: {r.piva}</span>}
                      </div>
                      <div style={{ fontSize:"0.58rem", color:"#666", marginTop:2 }}>
                        {r.data}{r.modificato?" · Mod: "+r.modificato:""}
                        {r.checklist && <span style={{ marginLeft:10 }}>· Verifiche: {r.checklist.filter(i=>i.stato==="completato").length}/{r.checklist.length} ✓</span>}
                      </div>
                    </div>
                    <div style={{ display:"flex", gap:6 }}>
                      <button onClick={()=>exportPDF(r)} style={{ background:"#b8302a", color:"#fff", border:"none", borderRadius:2, padding:"5px 10px", cursor:"pointer", fontFamily:"monospace", fontSize:"0.62rem", textTransform:"uppercase" }}>📥 PDF</button>
                      <button onClick={()=>setEditRep(r)} style={{ background:"#1565c0", color:"#fff", border:"none", borderRadius:2, padding:"5px 10px", cursor:"pointer", fontFamily:"monospace", fontSize:"0.62rem", textTransform:"uppercase" }}>✏️ Modifica</button>
                      <button onClick={()=>setDelConf(r.id)} style={{ background:"#555", color:"#fff", border:"none", borderRadius:2, padding:"5px 10px", cursor:"pointer", fontFamily:"monospace", fontSize:"0.62rem", textTransform:"uppercase" }}>🗑 Elimina</button>
                    </div>
                  </div>
                </div>
                {r.note && <div style={{ padding:"10px 18px", background:"#fff8f0", borderBottom:"1px solid #f0e8d8", fontSize:"0.75rem", color:"#7a5a1a" }}><strong>Note:</strong> {r.note}</div>}
                {r.checklist && r.checklist.some(i=>i.stato!=="non_verificato") && (
                  <div style={{ padding:"10px 18px", background:"#f8fff8", borderBottom:"1px solid #e0f0e0" }}>
                    <div style={{ fontSize:"0.6rem", textTransform:"uppercase", color:"#aaa", marginBottom:6 }}>Verifiche</div>
                    <div style={{ display:"flex", flexWrap:"wrap", gap:6 }}>
                      {r.checklist.filter(i=>i.stato!=="non_verificato").map(i => (
                        <span key={i.id} style={{ fontSize:"0.65rem", padding:"2px 8px", borderRadius:10, background: i.stato==="completato"?"#e8f5e9":i.stato==="in_corso"?"#fff3e0":"#ffebee", color: i.stato==="completato"?"#2e7d32":i.stato==="in_corso"?"#e67e00":"#b8302a" }}>
                          {i.stato==="completato"?"✓":i.stato==="in_corso"?"◎":"✗"} {i.label.split("—")[0]}
                        </span>
                      ))}
                    </div>
                  </div>
                )}
                <div style={{ padding:"12px 18px" }}>
                  {r.sections?.[0] && <pre style={{ fontSize:"0.72rem", color:"#555", whiteSpace:"pre-wrap", fontFamily:"monospace", lineHeight:1.7 }}>{r.sections[0].content}</pre>}
                </div>
              </div>
            ))}
            {!loading && reports.length > 0 && (
              <div style={{ fontSize:"0.62rem", color:"#aaa", textAlign:"center", marginTop:8 }}>
                {filteredReports.length} di {reports.length} report{search?" (filtrati)":""}
              </div>
            )}
          </div>
        )}

        <div style={{ marginTop:20, fontSize:"0.62rem", color:"#aaa", lineHeight:1.7, borderTop:"1px solid #ddd", paddingTop:12 }}>
          <strong style={{ color:"#888" }}>⚖ Uso professionale riservato.</strong> Solo fonti pubbliche lecite. GDPR (Reg. UE 2016/679), art. 6.
        </div>
      </div>

      {editRep && <EditModal report={editRep} onSave={handleEdit} onClose={()=>setEditRep(null)} />}

      {delConf && (
        <div className="overlay" onClick={()=>setDelConf(null)}>
          <div className="modal" style={{ maxWidth:380 }} onClick={e=>e.stopPropagation()}>
            <h3 style={{ fontFamily:"Georgia,serif", marginBottom:12 }}>Conferma eliminazione</h3>
            <p style={{ fontSize:"0.82rem", color:"#555", marginBottom:20 }}>Sei sicuro? L'operazione non può essere annullata.</p>
            <div style={{ display:"flex", gap:10 }}>
              <button onClick={()=>handleDelete(delConf)} style={{ flex:1, padding:12, background:"#c62828", color:"#fff", border:"none", borderRadius:3, cursor:"pointer", fontFamily:"monospace", fontSize:"0.75rem", textTransform:"uppercase" }}>🗑 Elimina</button>
              <button onClick={()=>setDelConf(null)} style={{ flex:1, padding:12, background:"#e8e4dc", color:"#555", border:"none", borderRadius:3, cursor:"pointer", fontFamily:"monospace", fontSize:"0.75rem", textTransform:"uppercase" }}>Annulla</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
