async function getOrCreateGist() {
  if (GIST_ID) return GIST_ID;
  const list = await fetch("https://api.github.com/gists", {
    headers: { Authorization: "token " + GH_TOKEN }
  }).then(r => r.json());
  const found = Array.isArray(list) && list.find(g => g.files && g.files[GIST_FILE]);
  if (found) { GIST_ID = found.id; localStorage.setItem("lextrace_gist_id", GIST_ID); return GIST_ID; }
  const created = await fetch("https://api.github.com/gists", {
    method: "POST",
    headers: { Authorization: "token " + GH_TOKEN, "Content-Type": "application/json" },
    body: JSON.stringify({ description: "LexTrace Reports", public: false, files: { [GIST_FILE]: { content: JSON.stringify({ reports: [] }) } } })
  }).then(r => r.json());
  GIST_ID = created.id;
  localStorage.setItem("lextrace_gist_id", GIST_ID);
  return GIST_ID;
}

async function loadReports() {
  try {
    const id = await getOrCreateGist();
    const g  = await fetch("https://api.github.com/gists/" + id, { headers: { Authorization: "token " + GH_TOKEN } }).then(r => r.json());
    return JSON.parse(g.files?.[GIST_FILE]?.content || '{"reports":[]}').reports || [];
  } catch { return []; }
}

async function saveReports(reports) {
  try {
    const id = await getOrCreateGist();
    await fetch("https://api.github.com/gists/" + id, {
      method: "PATCH",
      headers: { Authorization: "token " + GH_TOKEN, "Content-Type": "application/json" },
      body: JSON.stringify({ files: { [GIST_FILE]: { content: JSON.stringify({ reports }) } } })
    });
    return true;
  } catch { return false; }
}

function exportPDF(report) {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit: "mm", format: "a4" });
  const pageW = doc.internal.pageSize.getWidth();
  const margin = 15, maxW = pageW - margin * 2;
  let y = 20;
  const addText = (text, size, bold, color) => {
    doc.setFontSize(size); doc.setFont("helvetica", bold ? "bold" : "normal");
    doc.setTextColor(...(color || [30,30,30]));
    doc.splitTextToSize(text, maxW).forEach(line => {
      if (y > 270) { doc.addPage(); y = 20; }
      doc.text(line, margin, y); y += size * 0.45;
    }); y += 2;
  };
  doc.setFillColor(184,48,42); doc.rect(0,0,pageW,14,"F");
  doc.setFontSize(14); doc.setFont("helvetica","bold"); doc.setTextColor(255,255,255);
  doc.text("LexTrace — Dossier Investigativo", margin, 10); y = 24;
  report.sections.forEach((s, i) => {
    doc.setFillColor(i===0?26:46,26,26); doc.rect(margin-2,y-5,maxW+4,8,"F");
    doc.setFontSize(8); doc.setFont("helvetica","bold"); doc.setTextColor(245,242,235);
    doc.text(s.title, margin, y); y += 6;
    addText(s.content, 9, false, [40,40,40]); y += 3;
  });
  if (report.note) { addText("NOTE PERSONALI", 10, true, [184,48,42]); addText(report.note, 9, false); }
  const pages = doc.internal.getNumberOfPages();
  for (let i = 1; i <= pages; i++) {
    doc.setPage(i); doc.setFontSize(7); doc.setTextColor(150);
    doc.text("LexTrace · Uso professionale · GDPR Art. 6 · " + i + "/" + pages, margin, 290);
  }
  doc.save("LexTrace_" + (report.soggetto||"report").replace(/\s+/g,"_") + "_" + new Date().toISOString().slice(0,10) + ".pdf");
}

                  <div><label style={lbl}>Partita IVA</label><input style={inp} value={piva} onChange={e=>setPiva(e.target.value)} placeholder="01234567890" /></div>
                  <div><label style={lbl}>Sede</label><input style={inp} value={sede} onChange={e=>setSede(e.target.value)} placeholder="Via Roma 1, Milano" /></div>
                  <div><label style={lbl}>Contesto</label><input style={inp} value={contesto} onChange={e=>setContesto(e.target.value)} placeholder="es. recupero credito €50.000" /></div>
                </div>
              )}
              <div style={{ marginTop:12 }}>
                <label style={lbl}>Note personali</label>
                <textarea style={{ ...inp, resize:"vertical" }} rows={2} value={note} onChange={e=>setNote(e.target.value)} placeholder="Informazioni aggiuntive, comportamenti noti, precedenti..." />
              </div>
            </div>

            <div style={{ background:"#fff", border:"1px solid #d8d4cc", borderRadius:4, padding:22, marginBottom:16 }}>
              <div style={{ fontSize:"0.6rem", textTransform:"uppercase", color:"#aaa", letterSpacing:"0.1em", marginBottom:14, paddingBottom:8, borderBottom:"1px solid #eee" }}>Fonti</div>
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8 }}>
                {SOURCES.map(s => (
                  <div key={s.id} onClick={()=>toggleSrc(s.id)} style={{
                    display:"flex", alignItems:"center", gap:10, padding:"9px 14px",
                    border:"1px solid", borderRadius:3, cursor:"pointer",
                    borderColor: sources.includes(s.id) ? "#b8302a" : "#ddd",
                    background:  sources.includes(s.id) ? "#fff5f5" : "#fafaf8",
                  }}>
                    <div style={{ width:9, height:9, borderRadius:2, flexShrink:0, border:"1.5px solid", borderColor: sources.includes(s.id)?"#b8302a":"#ccc", background: sources.includes(s.id)?"#b8302a":"transparent" }} />
                    <div>
                      <div style={{ fontSize:"0.75rem", color:"#1a1a1a" }}>{s.name}</div>
                      <div style={{ fontSize:"0.6rem", color:"#aaa" }}>{s.cost}</div>
                    </div>
                  </div>
                ))}
              </div>
            </div>

            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12, marginBottom:20 }}>
              <button onClick={()=>setView("links")} disabled={!canSearch} style={btn("#b8302a", !canSearch)}>🔗 Link di ricerca</button>
              <button onClick={()=>setView("dossier")} disabled={!canSearch} style={btn("#1a1a1a", !canSearch)}>📄 Genera dossier</button>
            </div>

            {/* LINKS */}
            {view === "links" && links && (
              <div>
                <div style={{ fontSize:"0.65rem", color:"#888", marginBottom:14, textTransform:"uppercase" }}>Link per: <strong style={{ color:"#1a1a1a" }}>{soggetto}</strong></div>
                {links.map((group, gi) => (
                  <div key={gi} style={{ background:"#fff", border:"1px solid #d8d4cc", borderRadius:4, marginBottom:10, overflow:"hidden" }}>
                    <div style={{ background:"#2e2e2e", color:"#f5f2eb", padding:"9px 16px", fontSize:"0.65rem", textTransform:"uppercase", letterSpacing:"0.1em" }}>{group.label}</div>
                    {group.links.map((link, li) => (
                      <a key={li} href={link.url} target="_blank" rel="noopener noreferrer"
                        style={{ display:"flex", justifyContent:"space-between", padding:"10px 16px", background:"#fff", color:"inherit", borderBottom: li<group.links.length-1?"1px solid #f0ede6":"none" }}
                        onMouseEnter={e=>e.currentTarget.style.background="#fff8f8"}
                        onMouseLeave={e=>e.currentTarget.style.background="#fff"}
                      >
                        <span style={{ fontSize:"0.78rem", color:"#1a1a1a" }}>{link.name}</span>
                        <span style={{ fontSize:"0.65rem", color:"#b8302a" }}>APRI →</span>
                      </a>
                    ))}
                  </div>
                ))}
                <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12, marginTop:8 }}>
                  <button onClick={handleSave} disabled={saving} style={btn("#2e7d32", saving)}>{saving?"Salvataggio...":"💾 Salva in archivio"}</button>
                  <button onClick={()=>exportPDF({ soggetto, sections:generateSections(data), note })} style={btn("#b8302a", false)}>📥 Scarica PDF</button>
                </div>
                {msg && <div style={{ marginTop:8, fontSize:"0.78rem", color:msg.includes("✅")?"#2e7d32":"#b8302a" }}>{msg}</div>}
              </div>
            )}

            {/* DOSSIER */}
            {view === "dossier" && sections && (
              <div>
                {sections.map((s, i) => (
                  <div key={i} style={{ background:"#fff", border:"1px solid #d8d4cc", borderRadius:4, marginBottom:10, overflow:"hidden" }}>
                    <div style={{ background:i===0?"#1a1a1a":"#2e2e2e", color:"#f5f2eb", padding:"10px 18px", fontSize:i===0?"0.75rem":"0.65rem", letterSpacing:"0.1em", textTransform:"uppercase" }}>{s.title}</div>
                    <pre style={{ padding:"16px 18px", margin:0, whiteSpace:"pre-wrap", fontSize:"0.78rem", lineHeight:1.9, color:"#2a2a2a", fontFamily:"monospace" }}>{s.content}</pre>
                  </div>
                ))}
                <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12, marginTop:4 }}>
                  <button onClick={handleSave} disabled={saving} style={btn("#2e7d32", saving)}>{saving?"Salvataggio...":"💾 Salva in archivio"}</button>
                  <button onClick={()=>exportPDF({ soggetto, sections, note })} style={btn("#b8302a", false)}>📥 Scarica PDF</button>
                </div>
                {msg && <div style={{ marginTop:8, fontSize:"0.78rem", color:msg.includes("✅")?"#2e7d32":"#b8302a" }}>{msg}</div>}
              </div>
            )}
          </>
        )}

        {/* ARCHIVIO */}
        {view === "archivio" && (
          <div>
            {/* Barra ricerca */}
            <div style={{ position:"relative", marginBottom:20 }}>
              <input
                style={{ ...inp, paddingLeft:36, fontSize:"0.85rem" }}
                value={search}
                onChange={e=>setSearch(e.target.value)}
                placeholder="Cerca per nome, cognome, CF, P.IVA, contesto..."
              />
              <span style={{ position:"absolute", left:12, top:"50%", transform:"translateY(-50%)", color:"#aaa", fontSize:"1rem" }}>🔍</span>
              {search && <span onClick={()=>setSearch("")} style={{ position:"absolute", right:12, top:"50%", transform:"translateY(-50%)", cursor:"pointer", color:"#aaa", fontSize:"0.9rem" }}>✕</span>}
            </div>

            {msg && <div style={{ marginBottom:12, fontSize:"0.78rem", color:msg.includes("✅")||msg.includes("🗑")?"#2e7d32":"#b8302a", padding:"8px 12px", background:"#f0fff0", borderRadius:3 }}>{msg}</div>}

            {loading && <div style={{ color:"#888", fontSize:"0.8rem", padding:20 }}>Caricamento da GitHub Gist...</div>}

            {!loading && filteredReports.length === 0 && (
              <div style={{ background:"#fff", border:"1px solid #d8d4cc", borderRadius:4, padding:48, textAlign:"center", color:"#bbb", fontSize:"0.75rem", textTransform:"uppercase", letterSpacing:"0.08em" }}>
                {search ? "Nessun risultato per \"" + search + "\"" : "Nessun report salvato"}
              </div>
            )}

            {!loading && filteredReports.map((r) => (
              <div key={r.id} style={{ background:"#fff", border:"1px solid #d8d4cc", borderRadius:4, marginBottom:12, overflow:"hidden" }}>
                {/* Card header */}
                <div style={{ background:"#1a1a1a", color:"#f5f2eb", padding:"12px 18px" }}>
                  <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", flexWrap:"wrap", gap:8 }}>
                    <div>
                      <div style={{ fontSize:"0.88rem", fontWeight:"bold" }}>{r.soggetto}</div>
                      <div style={{ fontSize:"0.62rem", color:"#aaa", marginTop:3 }}>
                        {r.tab === "persona" ? "👤 Persona fisica" : "🏢 Azienda"} · {r.contesto}
                        {r.cf   && <span style={{ marginLeft:10, color:"#888" }}>CF: {r.cf}</span>}
                        {r.piva && <span style={{ marginLeft:10, color:"#888" }}>P.IVA: {r.piva}</span>}
                      </div>
                      <div style={{ fontSize:"0.58rem", color:"#666", marginTop:2 }}>
                        Creato: {r.data}{r.modificato ? " · Modificato: " + r.modificato : ""}
                      </div>
                    </div>
                    {/* Azioni */}
                    <div style={{ display:"flex", gap:6, flexShrink:0 }}>
                      <button onClick={()=>exportPDF(r)} title="Scarica PDF" style={{ background:"#b8302a", color:"#fff", border:"none", borderRadius:2, padding:"5px 10px", cursor:"pointer", fontFamily:"monospace", fontSize:"0.62rem", textTransform:"uppercase" }}>📥 PDF</button>
                      <button onClick={()=>setEditRep(r)} title="Modifica" style={{ background:"#1565c0", color:"#fff", border:"none", borderRadius:2, padding:"5px 10px", cursor:"pointer", fontFamily:"monospace", fontSize:"0.62rem", textTransform:"uppercase" }}>✏️ Modifica</button>
                      <button onClick={()=>setDelConf(r.id)} title="Elimina" style={{ background:"#555", color:"#fff", border:"none", borderRadius:2, padding:"5px 10px", cursor:"pointer", fontFamily:"monospace", fontSize:"0.62rem", textTransform:"uppercase" }}>🗑 Elimina</button>
                    </div>
                  </div>
                </div>

                {/* Note */}
                {r.note && (
                  <div style={{ padding:"10px 18px", background:"#fff8f0", borderBottom:"1px solid #f0e8d8", fontSize:"0.75rem", color:"#7a5a1a" }}>
                    <strong>Note:</strong> {r.note}
                  </div>
                )}

                {/* Anteprima sezione 1 */}
                <div style={{ padding:"12px 18px" }}>
                  {r.sections?.[0] && (
                    <pre style={{ fontSize:"0.72rem", color:"#555", whiteSpace:"pre-wrap", fontFamily:"monospace", lineHeight:1.7 }}>{r.sections[0].content}</pre>
                  )}
                </div>
              </div>
            ))}

            {!loading && reports.length > 0 && (
              <div style={{ fontSize:"0.62rem", color:"#aaa", textAlign:"center", marginTop:8 }}>
                {filteredReports.length} di {reports.length} report{search ? " (filtrati)" : ""}
              </div>
            )}
          </div>
        )}

        <div style={{ marginTop:20, fontSize:"0.62rem", color:"#aaa", lineHeight:1.7, borderTop:"1px solid #ddd", paddingTop:12 }}>
          <strong style={{ color:"#888" }}>⚖ Uso professionale riservato.</strong> Solo fonti pubbliche lecite. GDPR (Reg. UE 2016/679), art. 6.
        </div>
      </div>

      {/* MODAL MODIFICA */}
      {editRep && <EditModal report={editRep} onSave={handleEdit} onClose={()=>setEditRep(null)} />}

      {/* CONFERMA ELIMINAZIONE */}
      {delConf && (
        <div className="overlay" onClick={()=>setDelConf(null)}>
          <div className="modal" style={{ maxWidth:380 }} onClick={e=>e.stopPropagation()}>
            <h3 style={{ fontFamily:"Georgia,serif", marginBottom:12 }}>Conferma eliminazione</h3>
            <p style={{ fontSize:"0.82rem", color:"#555", marginBottom:20 }}>Sei sicuro di voler eliminare questo report? L'operazione non può essere annullata.</p>
            <div style={{ display:"flex", gap:10 }}>
              <button onClick={()=>handleDelete(delConf)} style={{ flex:1, padding:12, background:"#c62828", color:"#fff", border:"none", borderRadius:3, cursor:"pointer", fontFamily:"monospace", fontSize:"0.75rem", textTransform:"uppercase" }}>🗑 Elimina</button>
              <button onClick={()=>setDelConf(null)} style={{ flex:1, padding:12, background:"#e8e4dc", color:"#555", border:"none", borderRadius:3, cursor:"pointer", fontFamily:"monospace", fontSize:"0.75rem", textTransform:"uppercase" }}>Annulla</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
