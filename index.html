// ─── GITHUB GIST CONFIG ───────────────────────────────────────────────────────
const GH_TOKEN   = "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";
const GIST_FILE  = "lextrace_reports.json";
let   GIST_ID    = localStorage.getItem("lextrace_gist_id") || "";

async function getOrCreateGist() {
  if (GIST_ID) return GIST_ID;
  // Cerca gist esistente
  const list = await fetch("https://api.github.com/gists", {
    headers: { Authorization: "token " + GH_TOKEN, Accept: "application/vnd.github.v3+json" }
  }).then(r => r.json());
  const found = list.find && list.find(g => g.files && g.files[GIST_FILE]);
  if (found) {
    GIST_ID = found.id;
    localStorage.setItem("lextrace_gist_id", GIST_ID);
    return GIST_ID;
  }
  // Crea nuovo gist
  const created = await fetch("https://api.github.com/gists", {
    method: "POST",
    headers: { Authorization: "token " + GH_TOKEN, Accept: "application/vnd.github.v3+json", "Content-Type": "application/json" },
    body: JSON.stringify({ description: "LexTrace Reports", public: false, files: { [GIST_FILE]: { content: JSON.stringify({ reports: [] }) } } })
  }).then(r => r.json());
  GIST_ID = created.id;
  localStorage.setItem("lextrace_gist_id", GIST_ID);
  return GIST_ID;
}

async function loadReports() {
  try {
    const id = await getOrCreateGist();
    const g  = await fetch("https://api.github.com/gists/" + id, {
      headers: { Authorization: "token " + GH_TOKEN }
    }).then(r => r.json());
    const raw = g.files?.[GIST_FILE]?.content || '{"reports":[]}';
    return JSON.parse(raw).reports || [];
  } catch { return []; }
}

async function saveReports(reports) {
  try {
    const id = await getOrCreateGist();
    await fetch("https://api.github.com/gists/" + id, {
      method: "PATCH",
      headers: { Authorization: "token " + GH_TOKEN, "Content-Type": "application/json" },
      body: JSON.stringify({ files: { [GIST_FILE]: { content: JSON.stringify({ reports }) } } })
    });
    return true;
  } catch { return false; }
}

function exportPDF(report) {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit: "mm", format: "a4" });
  const pageW = doc.internal.pageSize.getWidth();
  const margin = 15;
  const maxW = pageW - margin * 2;
  let y = 20;

  const addText = (text, size, bold, color) => {
    doc.setFontSize(size);
    doc.setFont("helvetica", bold ? "bold" : "normal");
    doc.setTextColor(...(color || [30, 30, 30]));
    const lines = doc.splitTextToSize(text, maxW);
    lines.forEach(line => {
      if (y > 270) { doc.addPage(); y = 20; }
      doc.text(line, margin, y);
      y += size * 0.45;
    });
    y += 2;
  };

  doc.setFillColor(184, 48, 42);
  doc.rect(0, 0, pageW, 14, "F");
  doc.setFontSize(14);
  doc.setFont("helvetica", "bold");
  doc.setTextColor(255, 255, 255);
  doc.text("LexTrace — Dossier Investigativo", margin, 10);
  y = 24;

  report.sections.forEach((s, i) => {
    doc.setFillColor(i === 0 ? 26 : 46, 26, 26);
    doc.rect(margin - 2, y - 5, maxW + 4, 8, "F");
    doc.setFontSize(8);
    doc.setFont("helvetica", "bold");
    doc.setTextColor(245, 242, 235);
    doc.text(s.title, margin, y);
    y += 6;
    addText(s.content, 9, false, [40, 40, 40]);
    y += 3;
  });

  if (report.note) {
    addText("NOTE PERSONALI", 10, true, [184, 48, 42]);
    addText(report.note, 9, false);
  }

  const pages = doc.internal.getNumberOfPages();
  for (let i = 1; i <= pages; i++) {
    doc.setPage(i);
    doc.setFontSize(7);
    doc.setTextColor(150);
    doc.text("LexTrace · Uso professionale riservato · GDPR Art. 6 · " + i + "/" + pages, margin, 290);
  }

  doc.save("LexTrace_" + (report.soggetto || "report").replace(/\s+/g, "_") + "_" + new Date().toISOString().slice(0,10) + ".pdf");
}

                  </div>
                ))}
                <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12, marginTop:4 }}>
                  <button onClick={handleSave} disabled={saving} style={btn("#2e7d32", saving)}>{saving ? "Salvataggio..." : "💾 Salva in archivio"}</button>
                  <button onClick={()=>exportPDF({ soggetto, sections, note })} style={btn("#b8302a", false)}>📥 Scarica PDF</button>
                </div>
                {msg && <div style={{ marginTop:8, fontSize:"0.78rem", color: msg.includes("✅") ? "#2e7d32" : "#b8302a" }}>{msg}</div>}
              </div>
            )}
          </>
        )}

        {/* ARCHIVIO */}
        {view === "archivio" && (
          <div>
            <div style={{ fontSize:"0.65rem", textTransform:"uppercase", color:"#888", marginBottom:20, letterSpacing:"0.08em" }}>Archivio report — sincronizzato su tutti i dispositivi</div>
            {loading && <div style={{ color:"#888", fontSize:"0.8rem", padding:20 }}>Caricamento da GitHub Gist...</div>}
            {!loading && reports.length === 0 && (
              <div style={{ background:"#fff", border:"1px solid #d8d4cc", borderRadius:4, padding:48, textAlign:"center", color:"#bbb", fontSize:"0.75rem", textTransform:"uppercase", letterSpacing:"0.08em" }}>
                Nessun report salvato
              </div>
            )}
            {!loading && reports.map((r, i) => (
              <div key={i} style={{ background:"#fff", border:"1px solid #d8d4cc", borderRadius:4, marginBottom:12, overflow:"hidden" }}>
                <div style={{ background:"#1a1a1a", color:"#f5f2eb", padding:"12px 18px", display:"flex", justifyContent:"space-between", alignItems:"center", flexWrap:"wrap", gap:8 }}>
                  <div>
                    <div style={{ fontSize:"0.85rem", fontWeight:"bold" }}>{r.soggetto}</div>
                    <div style={{ fontSize:"0.62rem", color:"#aaa", marginTop:2 }}>{r.contesto} · {r.data}</div>
                  </div>
                  <div style={{ display:"flex", gap:8 }}>
                    <button onClick={()=>exportPDF(r)} style={{ background:"#b8302a", color:"#fff", border:"none", borderRadius:2, padding:"5px 12px", cursor:"pointer", fontFamily:"monospace", fontSize:"0.65rem", textTransform:"uppercase" }}>📥 PDF</button>
                  </div>
                </div>
                {r.note && (
                  <div style={{ padding:"10px 18px", background:"#fff8f0", borderBottom:"1px solid #f0e8d8", fontSize:"0.75rem", color:"#7a5a1a" }}>
                    <strong>Note:</strong> {r.note}
                  </div>
                )}
                <div style={{ padding:"14px 18px" }}>
                  {r.sections && r.sections[0] && (
                    <pre style={{ fontSize:"0.72rem", color:"#555", whiteSpace:"pre-wrap", fontFamily:"monospace", lineHeight:1.7 }}>{r.sections[0].content}</pre>
                  )}
                </div>
              </div>
            ))}
          </div>
        )}

        <div style={{ marginTop:20, fontSize:"0.62rem", color:"#aaa", lineHeight:1.7, borderTop:"1px solid #ddd", paddingTop:12 }}>
          <strong style={{ color:"#888" }}>⚖ Uso professionale riservato.</strong> Solo fonti pubbliche lecite. GDPR (Reg. UE 2016/679), art. 6.
        </div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
