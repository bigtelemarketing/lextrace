async function signIn(email, password) {
  const { data, error } = await sb.auth.signInWithPassword({ email, password });
  return { user: data?.user || null, error: error?.message || null };
}
async function signOut() { await sb.auth.signOut(); }
async function getProfilo(userId) {

    const { data } = await sb.from("profili").select("*").eq("id", userId).single();

}
async function getAllUtenti() {

function exportPDF(report) {
  const { jsPDF }=window.jspdf;
  const doc=new jsPDF({unit:"mm",format:"a4"});
  const pageW=doc.internal.pageSize.getWidth();
  const margin=15,maxW=pageW-margin*2;
  let y=20;
  const addText=(text,size,bold,color)=>{
    doc.setFontSize(size);doc.setFont("helvetica",bold?"bold":"normal");
    doc.setTextColor(...(color||[30,30,30]));
    doc.splitTextToSize(text,maxW).forEach(line=>{if(y>270){doc.addPage();y=20;}doc.text(line,margin,y);y+=size*0.45;});y+=2;
  };
  doc.setFillColor(184,48,42);doc.rect(0,0,pageW,14,"F");
  doc.setFontSize(14);doc.setFont("helvetica","bold");doc.setTextColor(255,255,255);
  doc.text("LexTrace — Dossier Investigativo",margin,10);y=24;
  (report.sections||[]).forEach((s,i)=>{
    doc.setFillColor(i===0?26:46,26,26);doc.rect(margin-2,y-5,maxW+4,8,"F");
    doc.setFontSize(8);doc.setFont("helvetica","bold");doc.setTextColor(245,242,235);
    doc.text(s.title,margin,y);y+=6;addText(s.content,9,false,[40,40,40]);y+=3;
  });
  if(report.checklist?.length){
    doc.setFillColor(46,46,46);doc.rect(margin-2,y-5,maxW+4,8,"F");
    doc.setFontSize(8);doc.setFont("helvetica","bold");doc.setTextColor(245,242,235);
    doc.text("CHECKLIST",margin,y);y+=8;
    report.checklist.forEach(item=>{
      if(y>270){doc.addPage();y=20;}
      doc.setFontSize(9);doc.setFont("helvetica","normal");doc.setTextColor(40,40,40);
      const s=item.stato==="completato"?"✓":item.stato==="in_corso"?"◎":"○";
      doc.text(s+" "+item.label+(item.note?" — "+item.note:""),margin,y);y+=6;
    });y+=4;
  }
  if(report.note){addText("NOTE",10,true,[184,48,42]);addText(report.note,9,false);}
  const pages=doc.internal.getNumberOfPages();
  for(let i=1;i<=pages;i++){doc.setPage(i);doc.setFontSize(7);doc.setTextColor(150);doc.text("LexTrace · GDPR Art. 6 · "+i+"/"+pages,margin,290);}
  doc.save("LexTrace_"+(report.soggetto||"report").replace(/\s+/g,"_")+"_"+new Date().toISOString().slice(0,10)+".pdf");
}

    setSaving(true);
    const {data,error}=await sb.auth.admin.createUser({email:newEmail,password:newPass,email_confirm:true});

  };
  const handleRuolo=async(id,ruolo)=>{
    await sb.from("profili").update({ruolo}).eq("id",id);
    setUtenti(prev=>prev.map(u=>u.id===id?{...u,ruolo}:u));
    showMsg("✅ Ruolo aggiornato");
  };
  const inp={width:"100%",padding:"8px 10px",border:"1px solid #ccc",borderRadius:3,fontFamily:"monospace",fontSize:"0.8rem",background:"#fafaf8",outline:"none"};
  const lbl={display:"block",fontSize:"0.6rem",textTransform:"uppercase",color:"#888",marginBottom:4};

function Checklist({checklist,onChange}) {
  const STATI=["non_verificato","in_corso","completato","non_trovato"];
  const SL={non_verificato:"○ Da verificare",in_corso:"◎ In corso",completato:"✓ Completato",non_trovato:"✗ Non trovato"};
  const SC={non_verificato:"#aaa",in_corso:"#e67e00",completato:"#2e7d32",non_trovato:"#b8302a"};
  const upd=(id,f,v)=>onChange(checklist.map(i=>i.id===id?{...i,[f]:v}:i));
  return(
    <div>
      {checklist.map(item=>(
        <div key={item.id} style={{background:"#fff",border:"1px solid #e0dcd4",borderRadius:4,padding:"11px 14px",marginBottom:8}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:8}}>
            <div style={{flex:1}}>
              <div style={{fontSize:"0.78rem",color:"#1a1a1a",fontWeight:"bold"}}>{item.label}</div>
              <div style={{fontSize:"0.6rem",color:"#aaa",marginTop:1}}>Fonte: {item.fonte}</div>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <a href={item.link} target="_blank" rel="noopener noreferrer" style={{fontSize:"0.62rem",color:"#b8302a"}}>Apri →</a>
              <select value={item.stato} onChange={e=>upd(item.id,"stato",e.target.value)} style={{border:"1px solid #ccc",borderRadius:3,padding:"4px 8px",fontFamily:"monospace",fontSize:"0.68rem",color:SC[item.stato],background:"#fafaf8",outline:"none"}}>
                {STATI.map(s=><option key={s} value={s}>{SL[s]}</option>)}
              </select>
            </div>
          </div>
          <input placeholder="Note risultato..." value={item.note||""} onChange={e=>upd(item.id,"note",e.target.value)}
            style={{width:"100%",marginTop:7,padding:"5px 10px",border:"1px solid #e0dcd4",borderRadius:3,fontFamily:"monospace",fontSize:"0.72rem",background:"#fafaf8",outline:"none"}}/>
        </div>
      ))}
    </div>
  );
}

          <button onClick={onClose} style={{flex:1,padding:12,background:"#e8e4dc",color:"#555",border:"none",borderRadius:3,cursor:"pointer",fontFamily:"monospace",fontSize:"0.75rem",textTransform:"uppercase"}}>Annulla</button>
        </div>
      </div>
    </div>
  );
}

            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20,gap:12,flexWrap:"wrap"}}>
              <div style={{position:"relative",flex:1,minWidth:200}}>
                <input style={{...inp,paddingLeft:36}} value={searchC} onChange={e=>setSearchC(e.target.value)} placeholder="Cerca per nome, email, CF, P.IVA..."/>
                <span style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",color:"#aaa"}}>🔍</span>
                {searchC&&<span onClick={()=>setSearchC("")} style={{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",cursor:"pointer",color:"#aaa"}}>✕</span>}
              </div>
              <button onClick={()=>setNewCl(true)} style={{padding:"9px 20px",background:"#1a1a1a",color:"#fff",border:"none",borderRadius:3,cursor:"pointer",fontFamily:"monospace",fontSize:"0.72rem",textTransform:"uppercase",whiteSpace:"nowrap"}}>+ Nuovo cliente</button>
            </div>
            {loading&&<div style={{textAlign:"center",padding:40,color:"#888"}}>⏳ Caricamento...</div>}
            {!loading&&filtC.length===0&&<div style={{background:"#fff",border:"1px solid #d8d4cc",borderRadius:4,padding:48,textAlign:"center",color:"#bbb",fontSize:"0.75rem",textTransform:"uppercase"}}>{searchC?`Nessun cliente per "${searchC}"`:"Nessun cliente."}</div>}
            {!loading&&filtC.map(c=>(
              <div key={c.id} style={{background:"#fff",border:"1px solid #d8d4cc",borderRadius:4,marginBottom:12,overflow:"hidden"}}>
                <div style={{padding:"14px 18px",borderBottom:expandCl===c.id?"1px solid #eee":"none"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:8}}>
                    <div style={{cursor:"pointer",flex:1}} onClick={()=>setExpandCl(expandCl===c.id?null:c.id)}>
                      <div style={{display:"flex",alignItems:"center",gap:8}}>
                        <span style={{fontSize:"1.1rem"}}>{c.tipo==="privato"?"👤":"🏢"}</span>
                        <div>
                          <div style={{fontSize:"0.9rem",fontWeight:"bold",color:"#1a1a1a"}}>{c.nome}</div>
                          <div style={{fontSize:"0.65rem",color:"#888",marginTop:2}}>
                            {c.email&&<span style={{marginRight:12}}>✉ {c.email}</span>}
                            {c.telefono&&<span style={{marginRight:12}}>📞 {c.telefono}</span>}
                            {c.piva&&<span style={{marginRight:12}}>P.IVA: {c.piva}</span>}
                            {c.cf&&<span>CF: {c.cf}</span>}
                          </div>
                        </div>
                      </div>
                    </div>
                    <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
                      {totCl(c)>0&&<span style={{fontSize:"0.68rem",padding:"3px 10px",background:"#e8f5e9",color:"#2e7d32",borderRadius:10}}>€{totCl(c).toFixed(0)} totale</span>}
                      {arrCl(c)>0&&<span style={{fontSize:"0.68rem",padding:"3px 10px",background:"#ffebee",color:"#b8302a",borderRadius:10}}>€{arrCl(c).toFixed(0)} arretrati</span>}
                      <button onClick={()=>setOrdineFor(c)} style={{background:"#b8302a",color:"#fff",border:"none",borderRadius:2,padding:"5px 10px",cursor:"pointer",fontFamily:"monospace",fontSize:"0.62rem",textTransform:"uppercase"}}>+ Ordine</button>
                      <button onClick={()=>setEditCl(c)} style={{background:"#1565c0",color:"#fff",border:"none",borderRadius:2,padding:"5px 10px",cursor:"pointer",fontFamily:"monospace",fontSize:"0.62rem",textTransform:"uppercase"}}>✏️</button>
                      <button onClick={()=>setDelClConf(c.id)} style={{background:"#555",color:"#fff",border:"none",borderRadius:2,padding:"5px 10px",cursor:"pointer",fontFamily:"monospace",fontSize:"0.62rem",textTransform:"uppercase"}}>🗑</button>
                    </div>
                  </div>
                </div>
                {expandCl===c.id&&(
                  <div style={{padding:"0 18px 16px"}}>
                    <div style={{marginTop:14,marginBottom:14}}>
                      <div style={{fontSize:"0.6rem",textTransform:"uppercase",color:"#aaa",marginBottom:8}}>Listino prezzi</div>
                      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(160px,1fr))",gap:6}}>
                        {(c.listino||LISTINO_DEFAULT).map(v=>(
                          <div key={v.id} style={{padding:"8px 12px",background:"#f5f2eb",borderRadius:3,border:"1px solid #e8e4dc"}}>
                            <div style={{fontSize:"0.72rem",color:"#1a1a1a"}}>{v.nome}</div>
                            <div style={{fontSize:"0.88rem",fontWeight:"bold",color:"#b8302a",marginTop:2}}>€{v.prezzo}</div>
                          </div>
                        ))}
                      </div>
                    </div>
                    <div style={{fontSize:"0.6rem",textTransform:"uppercase",color:"#aaa",marginBottom:8}}>Storico ordini ({(c.ordini||[]).length})</div>
                    {(c.ordini||[]).length===0&&<div style={{fontSize:"0.75rem",color:"#ccc",padding:"12px 0"}}>Nessun ordine ancora</div>}
                    {(c.ordini||[]).map(o=>(
                      <div key={o.id} style={{border:"1px solid #e8e4dc",borderRadius:3,marginBottom:8,overflow:"hidden"}}>
                        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 14px",background:"#fafaf8",flexWrap:"wrap",gap:6}}>
                          <div>
                            <span style={{fontSize:"0.75rem",color:"#1a1a1a",fontWeight:"bold"}}>Ordine #{String(o.id).slice(-6)}</span>
                            <span style={{fontSize:"0.62rem",color:"#888",marginLeft:10}}>{o.data}</span>
                          </div>
                          <div style={{display:"flex",alignItems:"center",gap:8}}>
                            <span style={{fontSize:"0.88rem",fontWeight:"bold",color:"#1a1a1a"}}>€{(o.totale||0).toFixed(2)}</span>
                            <select value={o.stato} onChange={e=>handleStatoPag(c.id,o.id,e.target.value)}
                              style={{border:"1px solid #ddd",borderRadius:3,padding:"3px 8px",fontFamily:"monospace",fontSize:"0.65rem",color:STATI_PAG_COLOR[o.stato],background:"#fff",outline:"none"}}>
                              {STATI_PAG.map(s=><option key={s} value={s}>{STATI_PAG_LABEL[s]}</option>)}
                            </select>
                            <button onClick={()=>exportPreventivoPDF(c,o)} style={{background:"#2e2e2e",color:"#fff",border:"none",borderRadius:2,padding:"3px 8px",cursor:"pointer",fontFamily:"monospace",fontSize:"0.6rem"}}>PDF</button>
                          </div>
                        </div>
                        <div style={{padding:"8px 14px"}}>
                          {(o.voci||[]).map((v,i)=>(
                            <div key={i} style={{display:"flex",justifyContent:"space-between",fontSize:"0.72rem",color:"#555",padding:"2px 0",borderBottom:i<o.voci.length-1?"1px solid #f0ede6":"none"}}>
                              <span>{v.servizio}{v.soggetto&&<span style={{color:"#aaa"}}> — {v.soggetto}</span>}</span>
                              <span style={{color:"#1a1a1a"}}>€{v.prezzo}</span>
                            </div>
                          ))}
                          {o.note&&<div style={{fontSize:"0.65rem",color:"#aaa",marginTop:6}}>Note: {o.note}</div>}
                        </div>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            ))}
          </div>
        )}

        <div style={{marginTop:20,fontSize:"0.62rem",color:"#aaa",lineHeight:1.7,borderTop:"1px solid #ddd",paddingTop:12}}>
          <strong style={{color:"#888"}}>⚖ Uso professionale riservato.</strong> Solo fonti pubbliche lecite. GDPR Art. 6.
        </div>
      </div>

      {showAdmin&&<AdminUtenti onClose={()=>setShowAdmin(false)}/>}
      {editRep&&<EditReportModal report={editRep} onSave={handleEditReport} onClose={()=>setEditRep(null)}/>}
      {(newCl||editCl)&&<ClienteModal cliente={editCl||null} onSave={handleSaveCl} onClose={()=>{setNewCl(false);setEditCl(null);}}/>}
      {ordineFor&&<OrdineModal cliente={ordineFor} onSave={handleSaveOrdine} onClose={()=>setOrdineFor(null)}/>}
      {delConf&&(
        <div className="overlay" onClick={()=>setDelConf(null)}>
          <div className="modal" style={{maxWidth:360}} onClick={e=>e.stopPropagation()}>
            <h3 style={{fontFamily:"Georgia,serif",marginBottom:12}}>Elimina report?</h3>
            <p style={{fontSize:"0.82rem",color:"#555",marginBottom:20}}>Operazione non reversibile.</p>
            <div style={{display:"flex",gap:10}}>
              <button onClick={()=>handleDelReport(delConf)} style={{flex:1,padding:12,background:"#c62828",color:"#fff",border:"none",borderRadius:3,cursor:"pointer",fontFamily:"monospace",fontSize:"0.75rem",textTransform:"uppercase"}}>🗑 Elimina</button>
              <button onClick={()=>setDelConf(null)} style={{flex:1,padding:12,background:"#e8e4dc",color:"#555",border:"none",borderRadius:3,cursor:"pointer",fontFamily:"monospace",fontSize:"0.75rem",textTransform:"uppercase"}}>Annulla</button>
            </div>
          </div>
        </div>
      )}
      {delClConf&&(
        <div className="overlay" onClick={()=>setDelClConf(null)}>
          <div className="modal" style={{maxWidth:360}} onClick={e=>e.stopPropagation()}>
            <h3 style={{fontFamily:"Georgia,serif",marginBottom:12}}>Elimina cliente?</h3>
            <p style={{fontSize:"0.82rem",color:"#555",marginBottom:20}}>Verranno eliminati anche tutti gli ordini.</p>
            <div style={{display:"flex",gap:10}}>
              <button onClick={()=>handleDelCl(delClConf)} style={{flex:1,padding:12,background:"#c62828",color:"#fff",border:"none",borderRadius:3,cursor:"pointer",fontFamily:"monospace",fontSize:"0.75rem",textTransform:"uppercase"}}>🗑 Elimina</button>
              <button onClick={()=>setDelClConf(null)} style={{flex:1,padding:12,background:"#e8e4dc",color:"#555",border:"none",borderRadius:3,cursor:"pointer",fontFamily:"monospace",fontSize:"0.75rem",textTransform:"uppercase"}}>Annulla</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
