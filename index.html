async function getOrCreateGist() {
  if (GIST_ID) return GIST_ID;
  const list = await fetch("https://api.github.com/gists", { headers: { Authorization: "token " + GH_TOKEN } }).then(r => r.json());
  const found = Array.isArray(list) && list.find(g => g.files && g.files[GIST_FILE]);
  if (found) { GIST_ID = found.id; localStorage.setItem("lextrace_gist_id", GIST_ID); return GIST_ID; }
  const created = await fetch("https://api.github.com/gists", {
    method: "POST",
    headers: { Authorization: "token " + GH_TOKEN, "Content-Type": "application/json" },
    body: JSON.stringify({ description: "LexTrace Data", public: false, files: {
      [GIST_FILE]:  { content: JSON.stringify({ reports: [] }) },
      [GIST_FILE2]: { content: JSON.stringify({ clienti: [] }) },
    }})
  }).then(r => r.json());
  GIST_ID = created.id;
  localStorage.setItem("lextrace_gist_id", GIST_ID);
  return GIST_ID;
}

async function loadGist(file) {
  try {
    const id = await getOrCreateGist();
    const g  = await fetch("https://api.github.com/gists/" + id, { headers: { Authorization: "token " + GH_TOKEN } }).then(r => r.json());
    const raw = g.files?.[file]?.content;
    if (!raw) return [];
    const parsed = JSON.parse(raw);
    return parsed.reports || parsed.clienti || [];
  } catch { return []; }
}

async function saveGist(file, key, data) {
  try {
    const id = await getOrCreateGist();
    await fetch("https://api.github.com/gists/" + id, {
      method: "PATCH",
      headers: { Authorization: "token " + GH_TOKEN, "Content-Type": "application/json" },
      body: JSON.stringify({ files: { [file]: { content: JSON.stringify({ [key]: data }) } } })
    });
    return true;
  } catch { return false; }
}

function exportPDF(report) {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit:"mm", format:"a4" });
  const pageW = doc.internal.pageSize.getWidth();
  const margin = 15, maxW = pageW - margin*2;
  let y = 20;
  const addText = (text, size, bold, color) => {
    doc.setFontSize(size); doc.setFont("helvetica", bold?"bold":"normal");
    doc.setTextColor(...(color||[30,30,30]));
    doc.splitTextToSize(text, maxW).forEach(line => { if(y>270){doc.addPage();y=20;} doc.text(line,margin,y); y+=size*0.45; }); y+=2;
  };
  doc.setFillColor(184,48,42); doc.rect(0,0,pageW,14,"F");
  doc.setFontSize(14); doc.setFont("helvetica","bold"); doc.setTextColor(255,255,255);
  doc.text("LexTrace — Dossier Investigativo", margin, 10); y=24;
  (report.sections||[]).forEach((s,i) => {
    doc.setFillColor(i===0?26:46,26,26); doc.rect(margin-2,y-5,maxW+4,8,"F");
    doc.setFontSize(8); doc.setFont("helvetica","bold"); doc.setTextColor(245,242,235);
    doc.text(s.title,margin,y); y+=6; addText(s.content,9,false,[40,40,40]); y+=3;
  });
  if(report.checklist?.length) {
    doc.setFillColor(46,46,46); doc.rect(margin-2,y-5,maxW+4,8,"F");
    doc.setFontSize(8); doc.setFont("helvetica","bold"); doc.setTextColor(245,242,235);
    doc.text("CHECKLIST VERIFICHE",margin,y); y+=8;
    report.checklist.forEach(item => {
      if(y>270){doc.addPage();y=20;}
      doc.setFontSize(9); doc.setFont("helvetica","normal"); doc.setTextColor(40,40,40);
      const s=item.stato==="completato"?"✓":item.stato==="in_corso"?"◎":"○";
      doc.text(s+" "+item.label+(item.note?" — "+item.note:""),margin,y); y+=6;
    }); y+=4;
  }
  if(report.note){addText("NOTE PERSONALI",10,true,[184,48,42]);addText(report.note,9,false);}
  const pages=doc.internal.getNumberOfPages();
  for(let i=1;i<=pages;i++){doc.setPage(i);doc.setFontSize(7);doc.setTextColor(150);doc.text("LexTrace · Uso professionale · GDPR Art. 6 · "+i+"/"+pages,margin,290);}
  doc.save("LexTrace_"+(report.soggetto||"report").replace(/\s+/g,"_")+"_"+new Date().toISOString().slice(0,10)+".pdf");
}

// ─── MODAL EDIT REPORT ───────────────────────────────────────────────────────
function EditReportModal({ report, onSave, onClose }) {
  const [soggetto, setSoggetto] = useState(report.soggetto||"");
  const [contesto, setContesto] = useState(report.contesto||"");
  const [note, setNote]         = useState(report.note||"");
  const [cf, setCf]             = useState(report.cf||"");
  const [piva, setPiva]         = useState(report.piva||"");
  const [sections, setSections] = useState(report.sections||[]);
  const updateSec = (i,val) => { const u=[...sections]; u[i]={...u[i],content:val}; setSections(u); };
  const inp = { width:"100%", padding:"8px 10px", border:"1px solid #ccc", borderRadius:3, fontFamily:"monospace", fontSize:"0.8rem", background:"#fafaf8", outline:"none" };
  const lbl = { display:"block", fontSize:"0.6rem", textTransform:"uppercase", color:"#888", marginBottom:4 };
  return (
    <div className="overlay" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:20, borderBottom:"2px solid #1a1a1a", paddingBottom:12 }}>
          <h2 style={{ fontFamily:"Georgia,serif", fontSize:"1.3rem" }}>Modifica dossier</h2>
          <button onClick={onClose} style={{ background:"none", border:"none", fontSize:"1.2rem", cursor:"pointer" }}>✕</button>
        </div>
        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12, marginBottom:14 }}>
          <div><label style={lbl}>Soggetto</label><input style={inp} value={soggetto} onChange={e=>setSoggetto(e.target.value)} /></div>
          <div><label style={lbl}>Contesto</label><input style={inp} value={contesto} onChange={e=>setContesto(e.target.value)} /></div>
          <div><label style={lbl}>Codice Fiscale</label><input style={inp} value={cf} onChange={e=>setCf(e.target.value)} /></div>
          <div><label style={lbl}>Partita IVA</label><input style={inp} value={piva} onChange={e=>setPiva(e.target.value)} /></div>
        </div>
        <div style={{ marginBottom:14 }}><label style={lbl}>Note</label><textarea style={{ ...inp, resize:"vertical" }} rows={2} value={note} onChange={e=>setNote(e.target.value)} /></div>
        {sections.map((s,i) => (
          <div key={i} style={{ marginBottom:10 }}>
            <div style={{ background:"#2e2e2e", color:"#f5f2eb", padding:"5px 10px", borderRadius:"3px 3px 0 0", fontSize:"0.6rem", textTransform:"uppercase" }}>{s.title}</div>
            <textarea style={{ ...inp, borderRadius:"0 0 3px 3px", borderTop:"none", resize:"vertical" }} rows={4} value={s.content} onChange={e=>updateSec(i,e.target.value)} />
          </div>
        ))}
        <div style={{ display:"flex", gap:10, marginTop:8 }}>
          <button onClick={()=>onSave({...report,soggetto,contesto,note,cf,piva,sections})} style={{ flex:1, padding:12, background:"#2e7d32", color:"#fff", border:"none", borderRadius:3, cursor:"pointer", fontFamily:"monospace", fontSize:"0.75rem", textTransform:"uppercase" }}>💾 Salva</button>
          <button onClick={onClose} style={{ flex:1, padding:12, background:"#e8e4dc", color:"#555", border:"none", borderRadius:3, cursor:"pointer", fontFamily:"monospace", fontSize:"0.75rem", textTransform:"uppercase" }}>Annulla</button>
        </div>
      </div>
    </div>
  );
}

function Checklist({ checklist, onChange }) {
  const STATI=["non_verificato","in_corso","completato","non_trovato"];
  const SL={ non_verificato:"○ Da verificare", in_corso:"◎ In corso", completato:"✓ Completato", non_trovato:"✗ Non trovato" };
  const SC={ non_verificato:"#aaa", in_corso:"#e67e00", completato:"#2e7d32", non_trovato:"#b8302a" };
  const upd=(id,f,v)=>onChange(checklist.map(i=>i.id===id?{...i,[f]:v}:i));
  return (
    <div>
      {checklist.map(item=>(
        <div key={item.id} style={{ background:"#fff", border:"1px solid #e0dcd4", borderRadius:4, padding:"11px 14px", marginBottom:8 }}>
          <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", flexWrap:"wrap", gap:8 }}>
            <div style={{ flex:1 }}>
              <div style={{ fontSize:"0.78rem", color:"#1a1a1a", fontWeight:"bold" }}>{item.label}</div>
              <div style={{ fontSize:"0.6rem", color:"#aaa", marginTop:1 }}>Fonte: {item.fonte}</div>
            </div>
            <div style={{ display:"flex", alignItems:"center", gap:8 }}>
              <a href={item.link} target="_blank" rel="noopener noreferrer" style={{ fontSize:"0.62rem", color:"#b8302a" }}>Apri →</a>
              <select value={item.stato} onChange={e=>upd(item.id,"stato",e.target.value)} style={{ border:"1px solid #ccc", borderRadius:3, padding:"4px 8px", fontFamily:"monospace", fontSize:"0.68rem", color:SC[item.stato], background:"#fafaf8", outline:"none" }}>
                {STATI.map(s=><option key={s} value={s}>{SL[s]}</option>)}
              </select>
            </div>
          </div>
          <input placeholder="Note risultato..." value={item.note||""} onChange={e=>upd(item.id,"note",e.target.value)}
            style={{ width:"100%", marginTop:7, padding:"5px 10px", border:"1px solid #e0dcd4", borderRadius:3, fontFamily:"monospace", fontSize:"0.72rem", background:"#fafaf8", outline:"none" }} />
        </div>
      ))}
    </div>
  );
}

  const [ragione,   setRagione]   = useState("");
  const [piva,      setPiva]      = useState("");
  const [sede,      setSede]      = useState("");
  const [contesto,  setContesto]  = useState("");
  const [note,      setNote]      = useState("");
  const [sources,   setSources]   = useState(["cciaa","inipec","linkedin","gazzetta","tribunali"]);
  const [view,      setView]      = useState("form");
  const [subview,   setSubview]   = useState("dossier");
  const [reports,   setReports]   = useState([]);
  const [clienti,   setClienti]   = useState([]);
  const [saving,    setSaving]    = useState(false);
  const [loading,   setLoading]   = useState(false);
  const [msg,       setMsg]       = useState("");
  const [searchR,   setSearchR]   = useState("");
  const [searchC,   setSearchC]   = useState("");
  const [editRep,   setEditRep]   = useState(null);
  const [delConf,   setDelConf]   = useState(null);
  const [delClConf, setDelClConf] = useState(null);
  const [editCl,    setEditCl]    = useState(null);
  const [newCl,     setNewCl]     = useState(false);
  const [ordineFor, setOrdineFor] = useState(null);
  const [expandCl,  setExpandCl]  = useState(null);
  const [checklist, setChecklist] = useState(CHECKLIST_ITEMS.map(i=>({...i,stato:"non_verificato",note:""})));

  useEffect(() => {
    if(view==="archivio"){setLoading(true);loadReports().then(r=>{setReports(r);setLoading(false)});}
    if(view==="clienti") {setLoading(true);loadClienti().then(c=>{setClienti(c);setLoading(false)});}
  }, [view]);

  const toggleSrc = id=>setSources(s=>s.includes(id)?s.filter(x=>x!==id):[...s,id]);
  const data      = {tab,nome,cognome,cf,citta,ragione,piva,sede,contesto,note,sources};
  const soggetto  = tab==="persona"?(nome+" "+cognome).trim():ragione;
  const canSearch = tab==="persona"?nome.trim().length>0:ragione.trim().length>0;
  const links     = buildLinks(data);
  const sections  = generateSections(data);

  const filtR = reports.filter(r=>{if(!searchR.trim())return true;const q=searchR.toLowerCase();return(r.soggetto||"").toLowerCase().includes(q)||(r.cf||"").toLowerCase().includes(q)||(r.piva||"").toLowerCase().includes(q)||(r.contesto||"").toLowerCase().includes(q);});
  const filtC = clienti.filter(c=>{if(!searchC.trim())return true;const q=searchC.toLowerCase();return(c.nome||"").toLowerCase().includes(q)||(c.email||"").toLowerCase().includes(q)||(c.piva||"").toLowerCase().includes(q)||(c.cf||"").toLowerCase().includes(q);});

  const showMsg = m=>{setMsg(m);setTimeout(()=>setMsg(""),3000);};

  const handleSave = async()=>{
    setSaving(true);
    const report={id:Date.now(),data:new Date().toLocaleString("it-IT"),soggetto,tab,contesto:contesto||"Recupero crediti",note,cf,piva,sections,links,checklist};
    const ex=await loadReports();
    const ok=await saveReports([report,...ex]);
    ok?showMsg("✅ Salvato in archivio!"):showMsg("❌ Errore salvataggio");
    setSaving(false);
  };

  const handleDelReport=async id=>{const u=reports.filter(r=>r.id!==id);const ok=await saveReports(u);if(ok){setReports(u);showMsg("🗑 Eliminato");}else showMsg("❌ Errore");setDelConf(null);};
  const handleEditReport=async updated=>{const nl=reports.map(r=>r.id===updated.id?{...updated,modificato:new Date().toLocaleString("it-IT")}:r);const ok=await saveReports(nl);if(ok){setReports(nl);showMsg("✅ Salvato");}else showMsg("❌ Errore");setEditRep(null);};
  const handleSaveCl=async c=>{const ex=await loadClienti();const isNew=!editCl;const u=isNew?[c,...ex]:ex.map(x=>x.id===c.id?c:x);const ok=await saveClienti(u);if(ok){setClienti(u);showMsg(isNew?"✅ Cliente aggiunto!":"✅ Cliente aggiornato!");}else showMsg("❌ Errore");setNewCl(false);setEditCl(null);};
  const handleDelCl=async id=>{const u=clienti.filter(c=>c.id!==id);const ok=await saveClienti(u);if(ok){setClienti(u);showMsg("🗑 Cliente eliminato");}else showMsg("❌ Errore");setDelClConf(null);};
  const handleSaveOrdine=async ordine=>{const u=clienti.map(c=>c.id===ordineFor.id?{...c,ordini:[ordine,...(c.ordini||[])]}:c);const ok=await saveClienti(u);if(ok){setClienti(u);showMsg("✅ Ordine creato!");}else showMsg("❌ Errore");setOrdineFor(null);};
  const handleStatoPag=async(cid,oid,stato)=>{const u=clienti.map(c=>c.id===cid?{...c,ordini:(c.ordini||[]).map(o=>o.id===oid?{...o,stato}:o)}:c);const ok=await saveClienti(u);if(ok){setClienti(u);showMsg("✅ Stato aggiornato");}else showMsg("❌ Errore");};

  const inp={width:"100%",padding:"9px 12px",border:"1px solid #ccc",borderRadius:3,fontFamily:"monospace",fontSize:"0.82rem",background:"#fafaf8",outline:"none"};
  const lbl={display:"block",fontSize:"0.6rem",textTransform:"uppercase",letterSpacing:"0.08em",color:"#888",marginBottom:5};
  const btnS=(bg,dis)=>({padding:"12px 0",background:dis?"#ccc":bg,color:"#fff",border:"none",borderRadius:3,cursor:dis?"not-allowed":"pointer",fontFamily:"monospace",fontSize:"0.75rem",textTransform:"uppercase",letterSpacing:"0.05em",width:"100%"});
  const navBtn=(v,label)=><button onClick={()=>setView(v)} style={{background:view===v?"#1a1a1a":"#e8e4dc",color:view===v?"#fff":"#555",border:"none",borderRadius:3,padding:"7px 14px",cursor:"pointer",fontFamily:"monospace",fontSize:"0.68rem",textTransform:"uppercase"}}>{label}</button>;

  const totCl=c=>(c.ordini||[]).reduce((a,o)=>a+(o.totale||0),0);
  const arrCl=c=>(c.ordini||[]).filter(o=>o.stato==="arretrato").reduce((a,o)=>a+(o.totale||0),0);

  return (
    <div style={{background:"#f5f2eb",minHeight:"100vh",padding:"28px 20px"}}>
      <div style={{maxWidth:860,margin:"0 auto"}}>

        {/* Header */}
        <div style={{borderBottom:"2px solid #1a1a1a",paddingBottom:16,marginBottom:24}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:10}}>
            <div>
              <h1 style={{fontFamily:"Georgia,serif",fontSize:"2.2rem",lineHeight:1}}>Lex<span style={{color:"#b8302a"}}>Trace</span></h1>
              <p style={{fontSize:"0.65rem",color:"#888",marginTop:5,textTransform:"uppercase",letterSpacing:"0.06em"}}>Ricerca investigativa · Fonti pubbliche italiane</p>
            </div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
              {navBtn("form","🔍 Ricerca")}
              {navBtn("archivio","📁 Archivio"+(reports.length>0?" ("+reports.length+")":""))}
              {navBtn("clienti","👥 Clienti"+(clienti.length>0?" ("+clienti.length+")":""))}
            </div>
          </div>
        </div>

        {msg&&<div style={{marginBottom:16,padding:"10px 16px",background:msg.includes("✅")||msg.includes("🗑")?"#e8f5e9":"#ffebee",borderRadius:3,fontSize:"0.8rem",color:msg.includes("✅")||msg.includes("🗑")?"#2e7d32":"#b8302a"}}>{msg}</div>}

        {/* ── RICERCA ── */}
        {view==="form"&&(
          <>
            <div style={{display:"flex",borderBottom:"1px solid #ccc",marginBottom:20}}>
              {[["persona","👤 Persona fisica"],["azienda","🏢 Azienda"]].map(([t,l])=>(
                <button key={t} onClick={()=>setTab(t)} style={{background:"none",border:"none",marginBottom:-1,cursor:"pointer",fontFamily:"monospace",borderBottom:tab===t?"2px solid #b8302a":"2px solid transparent",padding:"9px 20px",fontSize:"0.72rem",textTransform:"uppercase",color:tab===t?"#1a1a1a":"#888"}}>{l}</button>
              ))}
            </div>
            <div style={{background:"#fff",border:"1px solid #d8d4cc",borderRadius:4,padding:22,marginBottom:16}}>
              <div style={{fontSize:"0.6rem",textTransform:"uppercase",color:"#aaa",letterSpacing:"0.1em",marginBottom:16,paddingBottom:8,borderBottom:"1px solid #eee"}}>Dati soggetto</div>
              {tab==="persona"?(
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
                  <div><label style={lbl}>Nome *</label><input style={inp} value={nome} onChange={e=>setNome(e.target.value)} placeholder="Mario" /></div>
                  <div><label style={lbl}>Cognome</label><input style={inp} value={cognome} onChange={e=>setCognome(e.target.value)} placeholder="Rossi" /></div>
                  <div><label style={lbl}>Codice Fiscale</label><input style={inp} value={cf} onChange={e=>setCf(e.target.value)} placeholder="RSSMRA80A01H501U" /></div>
                  <div><label style={lbl}>Città</label><input style={inp} value={citta} onChange={e=>setCitta(e.target.value)} placeholder="Milano" /></div>
                  <div style={{gridColumn:"1/-1"}}><label style={lbl}>Contesto</label><input style={inp} value={contesto} onChange={e=>setContesto(e.target.value)} placeholder="es. recupero credito €15.000" /></div>
                </div>
              ):(
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
                  <div><label style={lbl}>Ragione Sociale *</label><input style={inp} value={ragione} onChange={e=>setRagione(e.target.value)} placeholder="Rossi Srl" /></div>
                  <div><label style={lbl}>Partita IVA</label><input style={inp} value={piva} onChange={e=>setPiva(e.target.value)} placeholder="01234567890" /></div>
                  <div><label style={lbl}>Sede</label><input style={inp} value={sede} onChange={e=>setSede(e.target.value)} placeholder="Via Roma 1, Milano" /></div>
                  <div><label style={lbl}>Contesto</label><input style={inp} value={contesto} onChange={e=>setContesto(e.target.value)} placeholder="es. recupero credito €50.000" /></div>
                </div>
              )}
              <div style={{marginTop:12}}><label style={lbl}>Note personali</label><textarea style={{...inp,resize:"vertical"}} rows={2} value={note} onChange={e=>setNote(e.target.value)} placeholder="Informazioni aggiuntive..." /></div>
            </div>
            <div style={{background:"#fff",border:"1px solid #d8d4cc",borderRadius:4,padding:22,marginBottom:16}}>
              <div style={{fontSize:"0.6rem",textTransform:"uppercase",color:"#aaa",letterSpacing:"0.1em",marginBottom:14,paddingBottom:8,borderBottom:"1px solid #eee"}}>Fonti</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                {SOURCES.map(s=>(
                  <div key={s.id} onClick={()=>toggleSrc(s.id)} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 14px",border:"1px solid",borderRadius:3,cursor:"pointer",borderColor:sources.includes(s.id)?"#b8302a":"#ddd",background:sources.includes(s.id)?"#fff5f5":"#fafaf8"}}>
                    <div style={{width:9,height:9,borderRadius:2,flexShrink:0,border:"1.5px solid",borderColor:sources.includes(s.id)?"#b8302a":"#ccc",background:sources.includes(s.id)?"#b8302a":"transparent"}} />
                    <div><div style={{fontSize:"0.75rem",color:"#1a1a1a"}}>{s.name}</div><div style={{fontSize:"0.6rem",color:"#aaa"}}>{s.cost}</div></div>
                  </div>
                ))}
              </div>
            </div>
            {canSearch&&(
              <>
                <div style={{display:"flex",borderBottom:"1px solid #ccc",marginBottom:16}}>
                  {[["dossier","📄 Dossier"],["links","🔗 Link ricerca"],["checklist","✅ Checklist"]].map(([v,l])=>(
                    <button key={v} onClick={()=>setSubview(v)} style={{background:"none",border:"none",marginBottom:-1,cursor:"pointer",fontFamily:"monospace",borderBottom:subview===v?"2px solid #b8302a":"2px solid transparent",padding:"8px 16px",fontSize:"0.68rem",textTransform:"uppercase",color:subview===v?"#1a1a1a":"#888"}}>{l}</button>
                  ))}
                </div>
                {subview==="dossier"&&(
                  <div>
                    {sections.map((s,i)=>(
                      <div key={i} style={{background:"#fff",border:"1px solid #d8d4cc",borderRadius:4,marginBottom:10,overflow:"hidden"}}>
                        <div style={{background:i===0?"#1a1a1a":"#2e2e2e",color:"#f5f2eb",padding:"10px 18px",fontSize:i===0?"0.75rem":"0.65rem",letterSpacing:"0.1em",textTransform:"uppercase"}}>{s.title}</div>
                        <pre style={{padding:"16px 18px",margin:0,whiteSpace:"pre-wrap",fontSize:"0.78rem",lineHeight:1.9,color:"#2a2a2a",fontFamily:"monospace"}}>{s.content}</pre>
                      </div>
                    ))}
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginTop:4}}>
                      <button onClick={handleSave} disabled={saving} style={btnS("#2e7d32",saving)}>{saving?"Salvataggio...":"💾 Salva in archivio"}</button>
                      <button onClick={()=>exportPDF({soggetto,sections,checklist,note})} style={btnS("#b8302a",false)}>📥 Scarica PDF</button>
                    </div>
                  </div>
                )}
                {subview==="links"&&(
                  <div>
                    {links.map((group,gi)=>(
                      <div key={gi} style={{background:"#fff",border:"1px solid #d8d4cc",borderRadius:4,marginBottom:10,overflow:"hidden"}}>
                        <div style={{background:"#2e2e2e",color:"#f5f2eb",padding:"9px 16px",fontSize:"0.65rem",textTransform:"uppercase",letterSpacing:"0.1em"}}>{group.label}</div>
                        {group.links.map((link,li)=>(
                          <a key={li} href={link.url} target="_blank" rel="noopener noreferrer"
                            style={{display:"flex",justifyContent:"space-between",padding:"10px 16px",background:"#fff",color:"inherit",borderBottom:li<group.links.length-1?"1px solid #f0ede6":"none"}}
                            onMouseEnter={e=>e.currentTarget.style.background="#fff8f8"}
                            onMouseLeave={e=>e.currentTarget.style.background="#fff"}>
                            <span style={{fontSize:"0.78rem",color:"#1a1a1a"}}>{link.name}</span>
                            <span style={{fontSize:"0.65rem",color:"#b8302a"}}>APRI →</span>
                          </a>
                        ))}
                      </div>
                    ))}
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginTop:8}}>
                      <button onClick={handleSave} disabled={saving} style={btnS("#2e7d32",saving)}>{saving?"Salvataggio...":"💾 Salva in archivio"}</button>
                      <button onClick={()=>exportPDF({soggetto,sections,checklist,note})} style={btnS("#b8302a",false)}>📥 Scarica PDF</button>
                    </div>
                  </div>
                )}
                {subview==="checklist"&&(
                  <div>
                    <Checklist checklist={checklist} onChange={setChecklist} />
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginTop:12}}>
                      <button onClick={handleSave} disabled={saving} style={btnS("#2e7d32",saving)}>{saving?"Salvataggio...":"💾 Salva in archivio"}</button>
                      <button onClick={()=>exportPDF({soggetto,sections,checklist,note})} style={btnS("#b8302a",false)}>📥 Scarica PDF</button>
                    </div>
                  </div>
                )}
              </>
            )}
          </>
        )}

        {/* ── ARCHIVIO ── */}
        {view==="archivio"&&(
          <div>
            <div style={{position:"relative",marginBottom:20}}>
              <input style={{...inp,paddingLeft:36}} value={searchR} onChange={e=>setSearchR(e.target.value)} placeholder="Cerca per nome, CF, P.IVA, contesto..." />
              <span style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",color:"#aaa"}}>🔍</span>
              {searchR&&<span onClick={()=>setSearchR("")} style={{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",cursor:"pointer",color:"#aaa"}}>✕</span>}
            </div>
            {loading&&<div style={{color:"#888",padding:20}}>Caricamento...</div>}
            {!loading&&filtR.length===0&&<div style={{background:"#fff",border:"1px solid #d8d4cc",borderRadius:4,padding:48,textAlign:"center",color:"#bbb",fontSize:"0.75rem",textTransform:"uppercase"}}>{searchR?`Nessun risultato per "${searchR}"`:"Nessun report salvato"}</div>}
            {!loading&&filtR.map(r=>(
              <div key={r.id} style={{background:"#fff",border:"1px solid #d8d4cc",borderRadius:4,marginBottom:12,overflow:"hidden"}}>
                <div style={{background:"#1a1a1a",color:"#f5f2eb",padding:"12px 18px"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:8}}>
                    <div>
                      <div style={{fontSize:"0.88rem",fontWeight:"bold"}}>{r.soggetto}</div>
                      <div style={{fontSize:"0.62rem",color:"#aaa",marginTop:2}}>{r.tab==="persona"?"👤":"🏢"} {r.contesto}{r.cf&&<span style={{marginLeft:10}}>CF: {r.cf}</span>}{r.piva&&<span style={{marginLeft:10}}>P.IVA: {r.piva}</span>}</div>
                      <div style={{fontSize:"0.58rem",color:"#666",marginTop:2}}>{r.data}{r.modificato?" · Mod: "+r.modificato:""}{r.checklist&&<span style={{marginLeft:10}}>· Verifiche: {r.checklist.filter(i=>i.stato==="completato").length}/{r.checklist.length} ✓</span>}</div>
                    </div>
                    <div style={{display:"flex",gap:6}}>
                      <button onClick={()=>exportPDF(r)} style={{background:"#b8302a",color:"#fff",border:"none",borderRadius:2,padding:"5px 10px",cursor:"pointer",fontFamily:"monospace",fontSize:"0.62rem",textTransform:"uppercase"}}>📥 PDF</button>
                      <button onClick={()=>setEditRep(r)} style={{background:"#1565c0",color:"#fff",border:"none",borderRadius:2,padding:"5px 10px",cursor:"pointer",fontFamily:"monospace",fontSize:"0.62rem",textTransform:"uppercase"}}>✏️</button>
                      <button onClick={()=>setDelConf(r.id)} style={{background:"#555",color:"#fff",border:"none",borderRadius:2,padding:"5px 10px",cursor:"pointer",fontFamily:"monospace",fontSize:"0.62rem",textTransform:"uppercase"}}>🗑</button>
                    </div>
                  </div>
                </div>
                {r.note&&<div style={{padding:"8px 18px",background:"#fff8f0",borderBottom:"1px solid #f0e8d8",fontSize:"0.75rem",color:"#7a5a1a"}}><strong>Note:</strong> {r.note}</div>}
                {r.checklist?.some(i=>i.stato!=="non_verificato")&&(
                  <div style={{padding:"8px 18px",background:"#f8fff8",borderBottom:"1px solid #e0f0e0"}}>
                    <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
                      {r.checklist.filter(i=>i.stato!=="non_verificato").map(i=>(
                        <span key={i.id} style={{fontSize:"0.62rem",padding:"2px 7px",borderRadius:10,background:i.stato==="completato"?"#e8f5e9":i.stato==="in_corso"?"#fff3e0":"#ffebee",color:i.stato==="completato"?"#2e7d32":i.stato==="in_corso"?"#e67e00":"#b8302a"}}>
                          {i.stato==="completato"?"✓":i.stato==="in_corso"?"◎":"✗"} {i.label.split("—")[0].trim()}
                        </span>
                      ))}
                    </div>
                  </div>
                )}
                <div style={{padding:"12px 18px"}}>{r.sections?.[0]&&<pre style={{fontSize:"0.72rem",color:"#555",whiteSpace:"pre-wrap",fontFamily:"monospace",lineHeight:1.7}}>{r.sections[0].content}</pre>}</div>
              </div>
            ))}
            {!loading&&reports.length>0&&<div style={{fontSize:"0.62rem",color:"#aaa",textAlign:"center",marginTop:8}}>{filtR.length} di {reports.length} report{searchR?" (filtrati)":""}</div>}
          </div>
        )}

        {/* ── CLIENTI ── */}
        {view==="clienti"&&(
          <div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20,gap:12,flexWrap:"wrap"}}>
              <div style={{position:"relative",flex:1,minWidth:200}}>
                <input style={{...inp,paddingLeft:36}} value={searchC} onChange={e=>setSearchC(e.target.value)} placeholder="Cerca cliente per nome, email, CF, P.IVA..." />
                <span style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",color:"#aaa"}}>🔍</span>
                {searchC&&<span onClick={()=>setSearchC("")} style={{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",cursor:"pointer",color:"#aaa"}}>✕</span>}
              </div>
              <button onClick={()=>setNewCl(true)} style={{padding:"9px 20px",background:"#1a1a1a",color:"#fff",border:"none",borderRadius:3,cursor:"pointer",fontFamily:"monospace",fontSize:"0.72rem",textTransform:"uppercase",whiteSpace:"nowrap"}}>+ Nuovo cliente</button>
            </div>
            {loading&&<div style={{color:"#888",padding:20}}>Caricamento...</div>}
            {!loading&&filtC.length===0&&<div style={{background:"#fff",border:"1px solid #d8d4cc",borderRadius:4,padding:48,textAlign:"center",color:"#bbb",fontSize:"0.75rem",textTransform:"uppercase"}}>{searchC?`Nessun cliente per "${searchC}"`:"Nessun cliente. Clicca + Nuovo cliente."}</div>}
            {!loading&&filtC.map(c=>(
              <div key={c.id} style={{background:"#fff",border:"1px solid #d8d4cc",borderRadius:4,marginBottom:12,overflow:"hidden"}}>
                <div style={{padding:"14px 18px",borderBottom:expandCl===c.id?"1px solid #eee":"none"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:8}}>
                    <div style={{cursor:"pointer",flex:1}} onClick={()=>setExpandCl(expandCl===c.id?null:c.id)}>
                      <div style={{display:"flex",alignItems:"center",gap:8}}>
                        <span style={{fontSize:"1.1rem"}}>{c.tipo==="privato"?"👤":"🏢"}</span>
                        <div>
                          <div style={{fontSize:"0.9rem",fontWeight:"bold",color:"#1a1a1a"}}>{c.nome}</div>
                          <div style={{fontSize:"0.65rem",color:"#888",marginTop:2}}>
                            {c.email&&<span style={{marginRight:12}}>✉ {c.email}</span>}
                            {c.telefono&&<span style={{marginRight:12}}>📞 {c.telefono}</span>}
                            {c.piva&&<span style={{marginRight:12}}>P.IVA: {c.piva}</span>}
                            {c.cf&&<span>CF: {c.cf}</span>}
                          </div>
                        </div>
                      </div>
                    </div>
                    <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
                      {totCl(c)>0&&<span style={{fontSize:"0.68rem",padding:"3px 10px",background:"#e8f5e9",color:"#2e7d32",borderRadius:10}}>€{totCl(c).toFixed(0)} totale</span>}
                      {arrCl(c)>0&&<span style={{fontSize:"0.68rem",padding:"3px 10px",background:"#ffebee",color:"#b8302a",borderRadius:10}}>€{arrCl(c).toFixed(0)} arretrati</span>}
                      <button onClick={()=>setOrdineFor(c)} style={{background:"#b8302a",color:"#fff",border:"none",borderRadius:2,padding:"5px 10px",cursor:"pointer",fontFamily:"monospace",fontSize:"0.62rem",textTransform:"uppercase"}}>+ Ordine</button>
                      <button onClick={()=>setEditCl(c)} style={{background:"#1565c0",color:"#fff",border:"none",borderRadius:2,padding:"5px 10px",cursor:"pointer",fontFamily:"monospace",fontSize:"0.62rem",textTransform:"uppercase"}}>✏️</button>
                      <button onClick={()=>setDelClConf(c.id)} style={{background:"#555",color:"#fff",border:"none",borderRadius:2,padding:"5px 10px",cursor:"pointer",fontFamily:"monospace",fontSize:"0.62rem",textTransform:"uppercase"}}>🗑</button>
                    </div>
                  </div>
                </div>
                {expandCl===c.id&&(
                  <div style={{padding:"0 18px 16px"}}>
                    {/* Listino */}
                    <div style={{marginTop:14,marginBottom:14}}>
                      <div style={{fontSize:"0.6rem",textTransform:"uppercase",color:"#aaa",marginBottom:8}}>Listino prezzi personale</div>
                      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(160px,1fr))",gap:6}}>
                        {(c.listino||LISTINO_DEFAULT).map(v=>(
                          <div key={v.id} style={{padding:"8px 12px",background:"#f5f2eb",borderRadius:3,border:"1px solid #e8e4dc"}}>
                            <div style={{fontSize:"0.72rem",color:"#1a1a1a"}}>{v.nome}</div>
                            <div style={{fontSize:"0.88rem",fontWeight:"bold",color:"#b8302a",marginTop:2}}>€{v.prezzo}</div>
                          </div>
                        ))}
                      </div>
                    </div>
                    {/* Ordini */}
                    <div style={{fontSize:"0.6rem",textTransform:"uppercase",color:"#aaa",marginBottom:8}}>Storico ordini ({(c.ordini||[]).length})</div>
                    {(c.ordini||[]).length===0&&<div style={{fontSize:"0.75rem",color:"#ccc",padding:"12px 0"}}>Nessun ordine ancora</div>}
                    {(c.ordini||[]).map(o=>(
                      <div key={o.id} style={{border:"1px solid #e8e4dc",borderRadius:3,marginBottom:8,overflow:"hidden"}}>
                        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 14px",background:"#fafaf8",flexWrap:"wrap",gap:6}}>
                          <div>
                            <span style={{fontSize:"0.75rem",color:"#1a1a1a",fontWeight:"bold"}}>Ordine #{o.id.toString().slice(-6)}</span>
                            <span style={{fontSize:"0.62rem",color:"#888",marginLeft:10}}>{o.data}</span>
                            {o.sconto>0&&<span style={{fontSize:"0.62rem",color:"#2e7d32",marginLeft:10}}>Sconto: -€{o.sconto}</span>}
                          </div>
                          <div style={{display:"flex",alignItems:"center",gap:8}}>
                            <span style={{fontSize:"0.88rem",fontWeight:"bold",color:"#1a1a1a"}}>€{(o.totale||0).toFixed(2)}</span>
                            <select value={o.stato} onChange={e=>handleStatoPag(c.id,o.id,e.target.value)}
                              style={{border:"1px solid #ddd",borderRadius:3,padding:"3px 8px",fontFamily:"monospace",fontSize:"0.65rem",color:STATI_PAG_COLOR[o.stato],background:"#fff",outline:"none"}}>
                              {STATI_PAG.map(s=><option key={s} value={s}>{STATI_PAG_LABEL[s]}</option>)}
                            </select>
                            <button onClick={()=>exportPreventivoPDF(c,o)} style={{background:"#2e2e2e",color:"#fff",border:"none",borderRadius:2,padding:"3px 8px",cursor:"pointer",fontFamily:"monospace",fontSize:"0.6rem"}}>PDF</button>
                          </div>
                        </div>
                        {/* Dossier personalizzato incluso nell'ordine */}
                        {o.dossierPersonalizzato&&(
                          <div style={{padding:"6px 14px",background:"#f0f7ff",borderBottom:"1px solid #dce8f0"}}>
                            <div style={{fontSize:"0.6rem",color:"#888",marginBottom:4,textTransform:"uppercase"}}>Contenuto dossier</div>
                            <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
                              {o.dossierPersonalizzato.map(item=>(
                                <span key={item.id} style={{fontSize:"0.6rem",padding:"2px 7px",borderRadius:10,background:item.incluso?"#e3f2fd":"#f5f5f5",color:item.incluso?"#1565c0":"#aaa"}}>
                                  {item.incluso?"✓":"✗"} {item.label}
                                </span>
                              ))}
                            </div>
                          </div>
                        )}
                        <div style={{padding:"8px 14px"}}>
                          {(o.voci||[]).map((v,i)=>(
                            <div key={i} style={{display:"flex",justifyContent:"space-between",fontSize:"0.72rem",color:"#555",padding:"2px 0",borderBottom:i<o.voci.length-1?"1px solid #f0ede6":"none"}}>
                              <span>{v.servizio}{v.soggetto&&<span style={{color:"#aaa"}}> — {v.soggetto}</span>}{v.cfSoggetto&&<span style={{color:"#b8302a"}}> [{v.cfSoggetto}]</span>}</span>
                              <span style={{color:"#1a1a1a"}}>€{v.prezzo}</span>
                            </div>
                          ))}
                          {o.note&&<div style={{fontSize:"0.65rem",color:"#aaa",marginTop:6}}>Note: {o.note}</div>}
                        </div>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            ))}
          </div>
        )}

        <div style={{marginTop:20,fontSize:"0.62rem",color:"#aaa",lineHeight:1.7,borderTop:"1px solid #ddd",paddingTop:12}}>
          <strong style={{color:"#888"}}>⚖ Uso professionale riservato.</strong> Solo fonti pubbliche lecite. GDPR (Reg. UE 2016/679), art. 6.
        </div>
      </div>

      {editRep&&<EditReportModal report={editRep} onSave={handleEditReport} onClose={()=>setEditRep(null)} />}
      {(newCl||editCl)&&<ClienteModal cliente={editCl||null} onSave={handleSaveCl} onClose={()=>{setNewCl(false);setEditCl(null);}} />}
      {ordineFor&&<OrdineModal cliente={ordineFor} onSave={handleSaveOrdine} onClose={()=>setOrdineFor(null)} />}

      {delConf&&(
        <div className="overlay" onClick={()=>setDelConf(null)}>
          <div className="modal" style={{maxWidth:360}} onClick={e=>e.stopPropagation()}>
            <h3 style={{fontFamily:"Georgia,serif",marginBottom:12}}>Elimina report?</h3>
            <p style={{fontSize:"0.82rem",color:"#555",marginBottom:20}}>Operazione non reversibile.</p>
            <div style={{display:"flex",gap:10}}>
              <button onClick={()=>handleDelReport(delConf)} style={{flex:1,padding:12,background:"#c62828",color:"#fff",border:"none",borderRadius:3,cursor:"pointer",fontFamily:"monospace",fontSize:"0.75rem",textTransform:"uppercase"}}>🗑 Elimina</button>
              <button onClick={()=>setDelConf(null)} style={{flex:1,padding:12,background:"#e8e4dc",color:"#555",border:"none",borderRadius:3,cursor:"pointer",fontFamily:"monospace",fontSize:"0.75rem",textTransform:"uppercase"}}>Annulla</button>
            </div>
          </div>
        </div>
      )}

      {delClConf&&(
        <div className="overlay" onClick={()=>setDelClConf(null)}>
          <div className="modal" style={{maxWidth:360}} onClick={e=>e.stopPropagation()}>
            <h3 style={{fontFamily:"Georgia,serif",marginBottom:12}}>Elimina cliente?</h3>
            <p style={{fontSize:"0.82rem",color:"#555",marginBottom:20}}>Verranno eliminati anche tutti gli ordini associati.</p>
            <div style={{display:"flex",gap:10}}>
              <button onClick={()=>handleDelCl(delClConf)} style={{flex:1,padding:12,background:"#c62828",color:"#fff",border:"none",borderRadius:3,cursor:"pointer",fontFamily:"monospace",fontSize:"0.75rem",textTransform:"uppercase"}}>🗑 Elimina</button>
              <button onClick={()=>setDelClConf(null)} style={{flex:1,padding:12,background:"#e8e4dc",color:"#555",border:"none",borderRadius:3,cursor:"pointer",fontFamily:"monospace",fontSize:"0.75rem",textTransform:"uppercase"}}>Annulla</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
